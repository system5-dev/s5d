  heuristics:
  - 'A grep-based scanner self-matches its own syntax examples: doc comments and test fixtures that embed a live marker token get harvested as phantom markers. Mitigate by (a) anchoring the regex to a comment leader, and (b) never committing a fully-formed live token in the scanner''s own source — describe syntax in prose/SKILL and assemble the token at runtime in tests (format!("{}:debt","s5d")).'
