  summary: Shipped `s5d debt` (CLI + MCP s5d_debt) harvesting s5d:debt(ceiling, trigger) markers, binding file→owning component/spec via the arch component-path resolver, flagging no-trigger and unowned; --check exits non-zero on any no-trigger. 86/86 standalone_repos tests pass, clippy clean, runs clean on the s5d repo itself ("Clean ledger").
