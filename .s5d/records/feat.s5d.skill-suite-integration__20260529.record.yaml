  heuristics:
  - 'A skill that emits S5D artifacts must route through the `s5d` CLI/MCP, never hand-roll the spec YAML — hand-rolled YAML silently drifts from the Rust schema (rust/src/models.rs) and fails `s5d validate` (proven: adr.sh wrote `schema:`/`question:` top-level keys that don''t exist in the real schema). Validation against the source of truth is the whole point of shipping under S5D''s name.'
