  summary: 'Shipped the 9-skill suite first-class. Packaging (skills/ + install.sh SKILLS + Claude/Codex manifests) landed via Roman''s parallel commit 6c288d5; my redundant cp created nested dups which I removed. CLI-rewire done on the 2 producers that have CLI verbs: adr.sh (system-design) and plan.sh (domain-refactor) now call `s5d new` + `s5d decision add-hypothesis` instead of hand-rolling YAML — both verified to emit specs that pass `s5d validate` (previously they wrote schema-invalid YAML with `schema:`/`question:` top-level keys that would fail validation). security-scan waiver stays file-based because `s5d_waiver` is MCP-only (no CLI verb) — documented MCP as canonical. scenario-mine acceptance stays YAML-layer injection — documented, CLI verb deferred. [OBSERVED] local validation passes; production/consumer-run exercise still pending. install.sh multi-skill loop verified by inspection, not run live (would mutate ~/.claude/skills).'
