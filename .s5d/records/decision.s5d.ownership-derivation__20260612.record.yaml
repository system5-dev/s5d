decision:
  title: Derive global-alias ownership from ledger at rollback time
  winner_id: derive-ownership-from-ledger
  rejected_ids:
  - versioned-fingerprint
  - separate-ownership-checksum
  context: 'RAN-491: owning_package sits outside compute_state_fingerprint, so corruption is invisible to drift-check while rollback tombstoning depends on it. Fixing via fingerprint change would invalidate every existing baseline (mass false drift). TRIZ physical contradiction: formula must change and must not change.'
  decision: 'Rollback derives the owner of each global alias from the append-only ledger plus stored packages at the point of use. The stored owning_package field degrades to a verified cache: derivation confirms or vetoes tombstoning, never expands it; disagreement is a loud warning; underivable ownership falls back to the stored field (legacy repos keep working). Fingerprint formula untouched. Shared lib extraction removes the CLI/MCP rollback duplication so the cross-check exists once.'
  rationale: 'Only option that removes the contradiction instead of balancing it: the mutable field stops being load-bearing, so corrupting it stops being a threat — nothing to detect, no baselines invalidated, no migration day, no second persistent artifact. Probe on the s5d repo itself confirmed derivability (17/17 owners present in ledger).'
  consequences: 'Rollback gains a ledger+packages scan (rare operation, cheap). Tamper-to-dodge case (field edited away from true owner) is detected and reported but not auto-tombstoned — operator decides. Pre-ledger aliases degrade to stored-field trust with a warning. CLI and MCP rollback collapse into one lib function. Follow-up: full derived==stored equality check could later run in s5d ci exec as a read-only integrity check.'
  decided_at: 2026-06-12T07:00:43.400176+00:00
  confirmed_by: Roman
  expires_at: 2026-09-10
  do_list: []
  dont_list: []
  challenge:
    mode: standard
    passed: true
    summary: '5 probes run: ownership-transfer counter-argument refuted by identity.rs (first-creator-wins, renames preserve owner, no transfer API); edited-package tail failure bounded by veto-only semantics (derivation never expands tombstoning, disagreement = skip + loud warning); probe presence-only weakness acknowledged with full-derivation tests required; weakest-link check shows derivation sources sha256-bound/append-only vs unanchored alias field; alternatives D1/D2 carry refine verdicts, merkle-izing aliases recreates the contradiction. No fatal flaw.'
    checks: []
