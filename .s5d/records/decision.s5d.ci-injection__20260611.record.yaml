decision:
  title: CI injection via generated self-contained pipeline
  winner_id: generated-standalone-workflow
  rejected_ids:
  - composite-action-in-s5d-repo
  - reusable-workflow-include-project
  context: All S5D enforcement is local today; git push bypasses it. CI must block PRs that break spec validity, declared architecture, or drift.
  decision: 's5d ci init generates self-contained CI config (GitHub workflow, GitLab fragment): install pinned release binary, call s5d ci exec. ci exec runs ONLY built-in read-only checks (validate all specs, architecture for declaring specs, drift-check) — gate_commands never execute in generated CI. Template carries a version marker; s5d ci check reports staleness.'
  rationale: 'One generator covers both platforms; logic ships in the binary so the template cannot drift functionally; SHA-pinning erases the central-update benefit of the composite-action alternative; reusable workflow/Catalog requires publication (violates v1 constraint). Trust boundary handled structurally: untrusted PR context never runs repo-configured commands.'
  consequences: 'Generated pipeline is enforcement floor, not full gate parity: test/lint/contract command gates stay local or in the repo''s own CI. Follow-ups: checksums published with release assets; trusted-context full-gates mode as opt-in later phase.'
  decided_at: 2026-06-11T06:38:46.037341+00:00
  confirmed_by: roman
  expires_at: 2026-09-09
  do_list: []
  dont_list: []
  challenge:
    mode: tactical
    passed: true
    summary: 'Tactical adversarial probe (Codex): initial design BREAKS — full run-gates in PR context executes untrusted fork code via gate_commands. Refined (specialise) to built-in-only ci exec; re-probe against platform docs: survives.'
    checks: []
