decision:
  title: 'Schema-lite native shaping: kernel-in-spec, commands reuse existing surfaces'
  winner_id: kernel-in-spec-schema-lite
  rejected_ids:
  - commands-only-zero-schema-change
  - full-bmad-artifact-model
  context: Phase 2 of BMAD assimilation. Phase 1 (skill docs) closed vague-intake and review-discipline gaps in the synthetic benchmark; remaining gaps are native runtime support. Naive approaches either leave intake intent outside sha-bound state (zero-schema) or add Story/Epic global artifacts into the alias/ownership machinery hardened in RAN-491 (full model).
  decision: Add intent_kernel as an optional skip-serialized Spec field carrying the 8 shape-layer fields verbatim. s5d shape ingests a kernel, classifies via the existing router, and scaffolds a spec with the kernel embedded. s5d review adversarial scaffolds the 3-layer report into .s5d/evidence/<spec>/. s5d plan stories inserts story-shaped workflow.phases entries into an existing spec. Readiness = validator rules over kernel structural completeness. CLI+MCP parity for all three.
  rationale: Only option that puts intake intent INTO sha-bound approved state (Acceptance Auditor reviews bound intent, not loose markdown) while keeping baseline safety by construction — skip-serialized optional field, proven additive pattern in this repo (evidence skill/agent fields). Stories reuse workflow.phases; no new global artifact types touch alias/ownership.
  consequences: Spec schema grows one optional struct (validated, fingerprint-neutral, compat test mandatory). Older binaries editing kernel-bearing specs drop the field — detected by the sha chain, documented limitation. PRD-to-epics mode (steal-list 5) deferred to Phase 3. Skill docs (shape-layer.md, SKILL.md) must point at the native commands once they exist.
  decided_at: 2026-06-12T08:38:16.857702+00:00
  confirmed_by: Roman
  expires_at: 2026-09-10
  do_list: []
  dont_list: []
  challenge:
    mode: standard
    passed: true
    summary: '5 probes: kernel/ProblemCard role split resolves duplication; old-binary field drop is sha-chain-detected; fingerprint-neutrality pinned as mandatory compat test; readiness checks structural only (thin layer); shape must reuse route(), review must reuse evidence-dir + gate:review. Roman pre-approved this exact scope — his go-ahead answered an offer naming kernel fields, readiness validation, the three commands, and review evidence integration.'
    checks: []
