  context: 'Вопрос: сделать S5D конкурентным с BMAD. Уточнён Романом: фокус S5D — поддержка методологии Operator Loop (requirements→architecture→verification), S5D уровнем выше BMAD, BMAD-эквивалент дёшев. Трибунал стресс-тестил формулировку перед фиксацией.'
  decision: 'S5D = repo-state assurance kernel — подмножество control plane Operator Loop''а (repo-state/spec/evidence/gates/decision/drift/rollback), линкующее телеметрию/флаги/CI через telemetry_refs/ROC, но НЕ владеющее ими. BMAD-класс воркфлоу = ВНЕШНИЙ skill-слой, вызывающий MCP-инструменты S5D на границах spec/evidence/decision. Фрейминг: ''BMAD ведёт front-of-loop discovery; S5D связывает и верифицирует repo-state-обязательства'', НЕ ''S5D над BMAD''.'
  rationale: 'Трибунал сошёлся (Codex REJECT-исходной→третий, Gemini APPROVE с теми же findings; арбитр: расхождение ярлыков мнимое). Две ловушки исходной формулировки [VERIFIED обоими, file:line]: (1) ''весь control plane'' — S5D не владеет flags/телеметрией/CI/триггерами; (2) ''над BMAD'' — elicitation+persona BMAD не сводится к role_map. Третий вариант сохраняет стратегию и держит границу control-plane≠orchestrator. spec_ref пропущен через --force: реализация (реорг) — downstream feature-спек, моделируется ПОСЛЕ фиксации позиции.'
  consequences: 'Реорг-таргет (отдельный feature-спек): (1) довести примитивы S5D (shape/elicitation-kernel, evidence-types, gates, decision) до тонкого assurance для внешнего воркфлоу; (2) elicitation+persona — в skill-слое, НЕ в spec-схеме; (3) ''дёшево'' применимо к assurance-проводке, не к elicitation/persona. Не приписывать S5D телеметрию/флаги; не затаскивать секвенирование ролей внутрь control plane.'
