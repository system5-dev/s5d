decision:
  title: Ship generic skill suite through existing S5D surfaces
  winner_id: first-class-suite-existing-contract
  rejected_ids:
  - schema-first-checkpoint-model
  - consumer-repo-source-of-truth
  - skillmd-only-distribution
  context: RAN-430 asks S5D to absorb nine generic Gigsure skills as first-class shipped skills with install/plugin wiring and deeper semantic integration.
  decision: Import complete skill directories into S5D, make S5D the canonical distribution source, wire install and plugin manifests, and express the first semantic integration as an artifact/evidence handshake over existing S5D records rather than a new Rust schema.
  rationale: This satisfies the shipped-suite requirement with the smallest truthful architecture move. Schema-first work is deferred because report formats are still heterogeneous; SKILL.md-only import fails runtime completeness; leaving Gigsure as source fails the requested target state.
  consequences: Distribution grows by about 864K and manifests must stay synchronized with skills/. A future schema extension remains open once multiple skills converge on a stable checkpoint/report shape.
  decided_at: 2026-05-29T15:14:21.683418+00:00
  confirmed_by: Roman
  expires_at: 2026-08-27
  do_list: []
  dont_list: []
  challenge:
    mode: standard
    passed: true
    summary: 'Five probes run: counterargument favored schema-first integration; tail failure was stale Gigsure paths in imported scripts/docs; evidence weakness was local-only adoption; weakest link was scripts/templates travelling with SKILL.md; existing alternatives were plugin-only and consumer-repo source. Decision response: copy full directories, normalize paths, verify manifests and shell/JSON surfaces, and avoid claiming schema enforcement until evidence exists.'
    checks: []
  decision_subject: S5D generic skill suite distribution and semantic integration boundary
  decision_subject_granularity: system
  evaluative_surface: axes=requirement-fit,runtime-completeness,semantic-honesty,blast-radius,reversibility; policy=prefer complete shipped suite without premature schema claim
  belief_state: Source has 147 files / 864K under Gigsure; current S5D distribution exposes only s5d skill; imported skills already output S5D-adjacent artifacts.
  outcome_model: After implementation, install/plugin surfaces expose all ten skills and S5D evidence remains compatible through existing records; schema extension can be added later without moving source again.
  pareto_set:
  - first-class-suite-existing-contract
  - schema-first-checkpoint-model
  choice_rule: lex-order(requirement-fit > runtime-completeness > semantic-honesty > lower-blast-radius)
