context: |
  ## Problem
  Project discovery currently lives in prose, ad-hoc notes, and manual code reading. S5D specs can describe domains, capabilities, entities, components, and links, but there is no canonical artifact that retrospectively indexes the repository and projects those claims into a graph.

  ## Goal
  Add a stack-agnostic discovery surface that builds `.s5d/discovery/*` from repository files and S5D specs: file index, evidence JSONL, graph JSON, and metamodel projection. The first version should be deterministic and conservative; language-specific parsers can be added later as optional evidence providers.

  ## Privacy
  Classification: Internal
workflow:
  mode: plan
  target_architecture:
    summary: Discovery is a deterministic index/projection layer over repository files and S5D-authored artifacts, not a new source of truth.
    invariants:
    - S5D specs remain the source of truth for declared domains, capabilities, entities, features, components, and projection links.
    - Discovery output is generated under `.s5d/discovery/` and can be checked for staleness.
    - "The first pass is stack-agnostic: path, file metadata, hashes, S5D specs, and conservative component candidates only."
    - Claims must carry status, confidence, and provenance so verified declarations stay distinct from inferred candidates.
    - Discovery must not require a network, external model, sandbox, or language-specific parser to run.
  delivery_strategy:
    summary: Add `s5d discover sync/check` plus a small library module that builds and serializes the discovery snapshot.
    rationale: This gives S5D a usable discovery artifact now while leaving parser-specific enrichment as later providers.
