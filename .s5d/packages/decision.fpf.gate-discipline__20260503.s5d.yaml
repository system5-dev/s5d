problem:
  signal: How to formalize gate discipline per FPF B.3.4:5 (waiver expiry) and C.22:5.4
    (Eligibility vs Acceptance split)?
  constraints:
  - Backward-compatible with existing specs
  - Graduated enforcement (high-tier required, lower tiers optional)
  - No new CLI surface unless feature requires it
  targets:
  - FPF compliance for the cited section
  - Auditability of the artifact
  - Thinness — keep S5D as a recording layer
  indicators:
  - Adoption per spec (count of new fields populated)
  - Schema migration errors (observation, not optimization)
  acceptance: 'Decision adopts the FPF-aligned hypothesis (variant A) iff: (i) winner
    is the full FPF adoption variant; (ii) >=1 normative FPF citation backs the winner;
    (iii) backward-compat preserved (existing specs unaffected); (iv) graduated enforcement
    (tier-aware required fields).'
  blast_radius: metamodel + validator + docs
  reversibility: high — additive fields, removable without data loss
  status: framed
hypotheses:
- id: full-split-waiver-expiry-mandatory
  title: Full split + waiver expiry mandatory
  content: 'Add gate.kind_class: eligibility|acceptance (eligibility=schema/graph,
    acceptance=review/test/contract). run-gates orders eligibility before acceptance,
    fails fast on eligibility. Waiver --expires-at made required; expired waivers
    auto-revoked at run-gates. Both per FPF C.22:5.4 + B.3.4:5.'
  scope: gates+waivers
  kind: system
  layer: L2
  r_eff: null
  evidence:
  - id: 20260503-internal-full-split-waiver-expiry-mandatory
    type: internal
    content: 'FPF C.22:5.4 distinguishes Eligibility (admittance) and Acceptance (thresholds).
      FPF B.3.4:5 CC-ED.5 mandates waiver expiry as auditable property. Both citations
      normative. Combining is natural: gate-discipline is one concept.'
    verdict: pass
    valid_until: 2026-08-01 15:07:33.548304+00:00
    carrier_ref: null
    formality: 4
