- id: dedicated-tier-agnostic-review-record
  title: Dedicated tier-agnostic review record
  content: 'Add a first-class review record on the Record (e.g. Record.reviews: Vec<ReviewRecord{reviewer,timestamp,verdict,scope,notes}>) plus a command `s5d run review <spec> --reviewer ... --verdict pass`, available to ALL tiers. The gate:review closure reads this list (any tier) in addition to the decision/high evidence path. Cleanly separates "code review" from both hypotheses-evidence (decision/high reasoning) and phase acceptance (broader run sign-off). Cost: most code — new struct, new command, new gate read branch, new tests; adds a surface that competes with existing evidence + phase-accept mechanisms; over-engineered for a narrow gap (violates minimal-additions ethos).'
  scope: s5d new review-record artifact + command + gate read path
  kind: system
  layer: L1
  r_eff: null
  evidence:
  - id: 20260629-internal-dedicated-tier-agnostic-review-record
    type: internal
    content: 'Cleanest semantics but highest cost: a new ReviewRecord struct + new `s5d run review` command + new gate read branch + new tests — a third review mechanism competing with hypotheses-evidence (decision/high) and phase-accept. Violates the minimal-additions constraint for a narrow gap, since phase_history already provides the named-reviewer human sign-off at zero new persistence. Justified only if review must be a tier-agnostic first-class fact, which the problem does not require.'
    verdict: pass
