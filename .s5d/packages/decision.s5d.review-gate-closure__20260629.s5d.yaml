- id: forbid-review-gate-on-feature-tiers-at-validation
  title: Forbid review gate on feature tiers at validation
  content: 'Make `review` a decision/high-only declarable gate: validate_spec (validate.rs:114-131) rejects a `review` gate on Standard/Lightweight, or effective_gates_for_spec filters it out for those tiers. The broken state becomes unreachable — feature specs simply cannot declare a gate they cannot close. No gate-engine change; honors the existing "evidence is decision/high" boundary. Cost: removes a legitimate want (lightweight code-review enforcement on a standard feature) — to get review on a feature the author must escalate to high tier (heavyweight: also forces schema+graph). Closes the gap by subtraction, gives feature specs zero review path.'
  scope: s5d gate-kind validation / effective-gate filtering by tier
  kind: system
  layer: L1
  r_eff: null
  evidence:
  - id: 20260629-internal-forbid-review-gate-on-feature-tiers-at-validation
    type: internal
    content: 'Closes the gap by subtraction — makes `review` undeclarable on standard/lightweight. This fails the problem''s own acceptance ("has a DEFINED closure path"): it gives feature specs zero review path, and a team wanting lightweight code-review enforcement must escalate the whole spec to high tier (which also forces schema+graph defaults). Solves "unclosable gate" but not the underlying want; strictly less capable than the phase-history path.'
    verdict: pass
    valid_until: 2026-09-27T17:48:01.487431+00:00
