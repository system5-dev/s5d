problem:
  signal: 'A standard- or lightweight-tier feature spec that declares a `review` gate can never close it: the gate:review closure (gates.rs:146-199) passes only on hypotheses[].evidence with evidence_type=gate:review+verdict=pass, and the sole attach path add_evidence hard-rejects non-decision/high tiers (mcp.rs:1885, s5d.rs:4591). Result: run-gates always fails, import is blocked (exit 7). Verified from source at HEAD 6341d2a.'
  constraints:
  - Minimal-additions ethos (no new first-class surface unless chosen); must not silently blur the decision/high evidence boundary; any gate-engine signature change must preserve eligibility-before-acceptance ordering (gates.rs:47-80); no regression to the 263 tests; CI dogfood green.
  targets:
  - smallest sufficient diff
  - human-review integrity (named reviewer)
  - uniform-or-explicitly-scoped gate semantics
  indicators: []
  goodhart_guard: null
  acceptance: A standard/lightweight feature spec with a declared review gate has a defined, human-backed closure path that lets run-gates report the review gate passed and import proceed; the closure records a human reviewer identity; the decision/high evidence-based path is unchanged; full Rust suite stays green and dogfood CI (s5d ci exec) stays green.
  blast_radius: null
  reversibility: null
  status: backlog
hypotheses:
- id: relax-add-evidence-to-accept-feature-tiers
  title: Relax add_evidence to accept feature tiers
  content: 'Flip the tier guard in add_evidence (and add_hypothesis if evidence needs a host hypothesis) on both MCP (mcp.rs:1885) and CLI (s5d.rs:4591) to also accept Standard/Lightweight. Feature specs then attach gate:review evidence the same way decision/high do; gates.rs closure is untouched. Smallest mechanical diff (flip ~2-4 matches). Cost: feature specs gain a hypotheses/evidence array the metamodel currently reserves for decision/high — blurs that boundary and invites ad-hoc evidence accumulation on feature specs; ignores the run/phase workflow feature specs actually use.'
  scope: s5d evidence-attachment tier guard + metamodel boundary
  kind: system
  layer: L1
  r_eff: null
  evidence:
  - id: 20260629-internal-relax-add-evidence-to-accept-feature-tiers
    type: internal
    content: 'Verified from source (HEAD 6341d2a): HypothesisEvidence (models.rs:641-643) carries evidence_type/verdict but NO reviewer field — so closing review via relaxed add_evidence records no named reviewer, weaker on the "records a human reviewer identity" acceptance criterion than phase_history (reviewer:Some(name)). It also places a hypotheses/evidence array on feature specs, which the metamodel reserves for decision/high. Feasible (smallest diff) but boundary-blurring with weaker human-identity.'
    verdict: pass
    valid_until: 2026-09-27T17:47:49.916955+00:00
