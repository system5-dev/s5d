- id: review-gate-reads-phase-history-accepted-entry
  title: Review gate reads phase_history Accepted entry
  content: 'Extend the gate:review closure to ALSO pass when the spec''s Record has >=1 WorkflowPhaseRecord{status:Accepted} in phase_history (the human run-phase sign-off written by run_phase_accept: reviewer + timestamp + notes "Human run evidence acceptance", s5d.rs:3055-3089). Decision/high keep the existing evidence path; feature tiers close review via the run-accept workflow they already use. Requires passing the Record into the gate engine (run_gates currently reads only spec.hypotheses; the Record is available at the CLI call site s5d.rs:3626). Cost: couples review-gate semantics to phase workflow; a feature spec with no workflow/phase still has no path (needs a documented fallback); "accepted a run phase" is arguably broader than "code-reviewed".'
  scope: s5d gate:review closure + run-phase acceptance binding
  kind: system
  layer: L1
  r_eff: null
  evidence:
  - id: 20260629-internal-review-gate-reads-phase-history-accepted-entry
    type: internal
    content: 'Feasibility verified from source (HEAD 6341d2a): run_phase_accept (s5d.rs:3055-3089) and its MCP twin (mcp.rs:2171-2211) already append WorkflowPhaseRecord{phase_id, status:Accepted, reviewer:Some(name), timestamp, notes:"Human run evidence acceptance"} to Record.phase_history — a named-human sign-off satisfying the "records a human reviewer identity" acceptance criterion. The Record is already loaded at the run-gates call site (s5d.rs:3626 record.gate_results.extend), so passing phase_history into gates::run_gates is a local signature extension, not new persistence. Acceptance requires record.status in {Approved,Applied,Operated}, so the sign-off can only exist post-approval — it cannot pre-authorize itself.'
    verdict: pass
    valid_until: 2026-09-27T13:18:00.206754+00:00
    carrier_ref: null
    formality: 4
    claim_scope:
    - feasibility + human-identity of the phase_history closure path
    congruence_level: null
    reliability: 0.85
