context: |
  ## Problem
  Nine generic, S5D-aware skills currently live under Gigsure's local Claude
  skill directory. They are useful beyond that consumer repo, but S5D ships only
  the umbrella `s5d` skill, so install/plugin discovery cannot expose the suite
  as a first-class package.

  ## Goal
  Make S5D the canonical source of truth for the full nine-skill suite:
  code-quality, unit-tests, e2e-tests, security-scan, domain-refactor,
  scaling-review, system-design, scenario-mine, and infra-scan.

  ## Scope
  Copy complete skill directories, including scripts/templates/references;
  register them in install.sh and Claude/Codex plugin manifests; preserve the
  existing Gemini context-file surface; and document the first semantic contract:
  skill outputs are S5D-adjacent artifacts (reports, SARIF/JUnit/LCOV, scenarios,
  acceptance YAML, ADR specs, waivers) that feed existing S5D evidence/checkpoint
  flows rather than a new Rust schema in this slice.

  ## Acceptance
  (i) all nine skill directories are present under `skills/`;
  (ii) `install.sh` installs all nine plus `s5d`;
  (iii) Claude and Codex plugin manifests expose all ten skills;
  (iv) source references to `.claude/skills/<name>/...` inside imported skill
  docs/scripts are rewritten to the installed `skills/<name>/...` layout or made
  repo-root relative;
  (v) validation proves the S5D package graph is sound and distribution files
  parse as JSON/shell.

  ## Privacy
  Classification: Internal
workflow:
  mode: plan
  target_architecture:
    summary: S5D ships a complete reusable skill suite whose runtime helpers travel with each skill, while semantic integration uses current S5D artifact/evidence surfaces until a schema-backed checkpoint model is justified.
    invariants:
    - Gigsure is no longer the source of truth for these generic skills.
    - A skill's SKILL.md, scripts, templates, and references move together.
    - Install and plugin manifests stay in sync with the `skills/` tree.
    - First-slice semantic integration is honest — reports and generated specs feed existing S5D records; no new Rust schema is claimed.
    - Consumer examples may mention Gigsure only as examples, not as required paths.
  delivery_strategy:
    summary: Import the suite whole, update distribution manifests, normalize local path references, then verify with S5D validation and lightweight distribution checks.
    rationale: Keeps the requested shipped-skills outcome narrow while avoiding a premature schema migration over still-variable report formats.
