problem:
  signal: ddd-refactor assess returned '0 anomalies' on a Rust repo because its analyze.sh only greps
    *.ts/*.tsx with gigsure-specific vocabulary — false-clean, discovered during skill situational testing
  constraints:
  - Zero shell scripts in the end state — all deterministic logic compiled Rust (Roman directive)
  - Assess output contract — analyzers must emit scanned-file counts and detected stacks; zero findings
    with zero scanned files must surface as stack-not-covered, never as a clean verdict
  - JSON output shapes stay flatten-compatible (findings[]/summary) so unported consumers keep working
    during the transition
  - Read-only — skill analyzers never write to the assessed repo
  targets:
  - Replace bash+jq+python3 runtime deps with the single s5d binary for ported skills
  - Honest verdicts — eliminate the false-clean class
  indicators:
  - Count of remaining .sh files in the repo (48 at start)
  goodhart_guard: The .sh count is an observation indicator, not a target to game — deleting a script
    without a compiled replacement of equal coverage is a regression, not progress.
  acceptance: 'Phase 1: `s5d skill ddd|scaling detect|analyze` run compiled, report scanned/stacks honestly,
    the six ddd-refactor/scaling-review .sh files are deleted, and both assess agents call the binary.
    Later phases extend to the rest of the suite, hooks, and install.'
  blast_radius: Skill suite consumers (assess agents, SKILL.md instructions); no runtime impact on the
    core spec state machine
  reversibility: moderate
  status: in_progress
