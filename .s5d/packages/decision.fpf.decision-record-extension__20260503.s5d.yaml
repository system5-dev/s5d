hypotheses:
- id: full-decsn-cal-subject-pareto-goodhart
  title: 'Full Decsn-CAL: subject+pareto+goodhart'
  content: 'Extend DecisionRecord: decision_subject, decision_subject_granularity,
    evaluative_surface (axes+policy), belief_state, outcome_model, pareto_set (id-list
    non-dominated), choice_rule. Forbid scalar weights in selection. Reflection.indicators:
    each marked observation:true|false (Goodhart guard). Validator rejects scalarized
    selection.'
  scope: decision/reflection records
  kind: system
  layer: L2
  r_eff: null
  evidence:
  - id: 20260503-internal-full-decsn-cal-subject-pareto-goodhart
    type: internal
    content: 'FPF C.11:4.5.1 lists explicit objects required in usable decision records.
      C.18 forbids weighted sums across mixed scales. C.17:14 mandates Anti-Goodhart
      guards. Rejecting these = noncompliance with three normative kernel extensions.
      NQD: thin=3, audit=5, ergo=3, schema=3, couple=5, rev=4 — wins on audit/couple.'
    verdict: pass
    valid_until: 2026-08-01 15:07:33.532967+00:00
