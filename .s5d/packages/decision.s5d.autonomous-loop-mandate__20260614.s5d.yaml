- id: two-plane-split-assurance-plane-plus-operate-loop-plane
  title: 'Two-plane split: assurance plane plus operate-loop plane'
  content: 'Keep S5D as the slow assurance plane (decisions, high-tier, human); add a thin SEPARATE operate-loop plane that consumes pre-approved specs, runs autonomously, and reports evidence back. REJECTED as a second plane: a separate plane can mutate outside the S5D state spine, leaking guarantees and drifting from the Ledger (models.rs:1120). Salvaged only as a thin runner/execution adapter subordinate to S5D — it may execute but must never write approvals/phase_runs/gate_results/ledger in S5D''s stead.'
  scope: S5D runtime boundary (execution adapter vs source of truth)
