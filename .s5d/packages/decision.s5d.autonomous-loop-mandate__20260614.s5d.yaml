- id: autonomy-as-a-tier-or-blast-radius-property
  title: Autonomy as a tier or blast-radius property
  content: 'No new type: for lightweight/standard specs under a declared budget the per-cycle human Approve auto-waives within the ROC envelope; high/decision always human-gated. Reuses existing waiver/ROC/tier machinery. REJECTED as the primary architecture: autonomy stays implicit policy over Tier+Roc+waivers — exactly the current scattered failure mode (not first-class). Salvaged as an embedded policy layer inside H1, provided every auto-waive is ledgered, expiring, and gate-result-backed.'
  scope: S5D policy (Tier, Roc, waivers)
  kind: system
  layer: L0
  r_eff: null
  evidence:
  - id: 20260614-gate-review-autonomy-as-a-tier-or-blast-radius-property
    type: gate:review
    content: 'Tribunal: Codex CONCERNS, Gemini REJECT. As a standalone architecture it keeps autonomy implicit policy over Tier+Roc+waivers — the exact current scattered failure (fails first-class criterion). But both auditors endorse it as an embedded policy layer inside H1, provided every auto-waive is ledgered, expiring, and gate-result-backed. Hence specialise: narrowed from architecture to a sub-policy of the Mandate.'
