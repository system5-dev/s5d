problem:
  signal: 'S5D hard-codes a human Approve gate before every Execute (Phase: ...Preview→Approve→Execute...), so each spec needs a human per cycle; the loop machinery (ExecutionMode, Roc, HarnessState, WorkflowPhaseRun, s5d_execute_loop) exists but is scattered and not first-class. S5D cannot run a long autonomous agentic cycle.'
  constraints:
  - Preserve SHA256 approval chain (Approval.spec_sha256 + diff_sha256); preserve append-only Ledger
  - rollback
  - drift-check
  - Record state-tracking; high/decision tiers stay human-gated per action; the envelope must ABSORB existing ExecutionMode+Roc controls
  - not duplicate them; no second source of truth — S5D remains the sole authority for approvals/phase_runs/gate_results/ledger.
  targets:
  - first-class autonomy (explicit envelope concept); reduced schema/ceremony on the hot path; guarantees fully preserved per iteration
  indicators: []
  goodhart_guard: null
  acceptance: One human-approved bounded envelope yields many autonomous iterations with zero human input between approval and a stop-condition; each iteration is SHA-bound, gated, ledgered, reversible, and drift-checkable; human approval happens once per envelope, not once per spec/cycle; ceremony on the hot path is reduced (fewer mandatory steps/types when an envelope is active).
  blast_radius: null
  reversibility: null
  status: backlog
hypotheses:
- id: mandate-envelope-as-first-class-aggregate
  title: Mandate envelope as first-class aggregate
  content: Add one first-class concept — Mandate{scope, budget(absorbs Roc), stop_conditions, pre-approved gates}. Human approves the Mandate ONCE (SHA-bound to scope+budget+stop+gates); the agent then loops inside it pulling work, executing, self-gating via run_gates, recording evidence; escalates to a human only on stop-condition / budget exhaustion / gate failure. Approve moves from per-spec to mandate-level. Mandate ABSORBS the scattered ExecutionMode+Roc controls rather than duplicating them; every iteration still writes GateResult+WorkflowPhaseRun+Record+LedgerEntry so SHA/ledger/rollback/drift guarantees hold per-cycle. Embeds H3 as a policy layer (tier/blast-radius decides which gates are pre-approvable) and admits H4 only as a thin runner adapter.
  scope: S5D lifecycle + schema (Phase, Spec aggregate, runtime state)
  kind: system
  layer: L1
  r_eff: null
  evidence:
  - id: 20260614-gate-review-mandate-envelope-as-first-class-aggregate
    type: gate:review
    content: 'Tribunal (Claude arbiter; Codex gpt-5.5-high + Gemini, both read models.rs). Per-hypothesis: H1 APPROVE+APPROVE → adopt; H2 REJECT(Codex,FATAL: collapsing Preview/Approve/Import severs Approval.spec_sha256+diff_sha256 bind, models.rs:961)+CONCERNS(Gemini); H3 CONCERNS+REJECT (autonomy implicit, not first-class); H4 CONCERNS+REJECT (second plane = guarantee leak vs Ledger). Both auditors converged INDEPENDENTLY on: H1 Mandate as architecture + H2 ceremony-stripping inside the envelope + H3 as embedded ledgered/expiring policy + H4 only as a thin subordinate runner adapter. Preserved invariant: one human-approved bounded envelope → many autonomous iterations, each SHA-bound, gated, ledgered, reversible, drift-checkable. Constraint flagged by both: Mandate must ABSORB ExecutionMode+Roc, not duplicate (models.rs:411/488).'
