- id: collapse-lifecycle-and-demote-spec-to-a-work-unit
  title: Collapse lifecycle and demote Spec to a work-unit
  content: 'Make the loop the primary object; demote Spec to a unit of work the loop consumes; fold Preview/Approve/Import into a single admit-to-envelope gate. Simplify by removal rather than addition. REJECTED as the mechanism: collapsing Preview→Approve→Import severs the joint that binds approval to spec_sha256+diff_sha256 before Execute (Approval, models.rs:961) — a direct breach of guarantee (c). Salvaged only as a philosophy: strip ceremony INSIDE H1''s envelope when a Mandate is active, never by cutting the assurance spine.'
