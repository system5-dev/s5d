problem:
  signal: How should S5D absorb the nine generic Gigsure skills as a first-class suite without overstating semantic integration?
  constraints:
  - The suite must become first-class in S5D distribution, not stay consumer-local.
  - The shipped skill contract must include scripts, templates, and references needed by SKILL.md instructions.
  - Semantic integration must be verifiable and must not claim schema enforcement that does not exist.
  - Existing dirty Rust/discovery work in the S5D worktree must not be overwritten by this slice.
  targets:
  - Canonical source for all nine generic skills moves to `skills/` in S5D.
  - Claude/Codex plugin manifests and install.sh expose the same skill set.
  - The first semantic contract is stated as S5D artifact/evidence handoff, with schema extension deferred.
  indicators:
  - Count of imported skill directories equals nine.
  - Manifest skill arrays include `s5d` plus the nine imported skills.
  - No imported instruction path requires Gigsure's `.claude/skills` layout.
  goodhart_guard: Do not treat manifest presence as semantic integration; require explicit artifact/evidence handoff language and verification.
  acceptance: Winner is acceptable iff it makes S5D the canonical source, preserves runtime helper files, wires install and plugin discovery, and states whether schema-backed checkpoint enforcement is in or out of the first slice.
  blast_radius: skills directory plus distribution manifests; Rust schema changes only if explicitly selected.
  reversibility: high — imported skills and manifest entries can be removed without data migration.
  status: framed
