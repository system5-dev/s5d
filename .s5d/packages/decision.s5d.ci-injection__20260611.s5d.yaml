- id: reusable-workflow-include-project
  title: Reusable workflow + include:project
  content: GitHub workflow_call reusable workflow hosted in s5d repo, user workflow is a 5-line caller; GitLab include:project pinned to a ref. Maximum central control, minimum user-repo surface.
  scope: ci injection
  kind: system
  layer: invalid
  r_eff: null
  evidence:
  - id: 20260611-external-reusable-workflow-include-project
    type: external
    content: workflow_call maximizes central control but is the least flexible (single-job shape), hardest to debug locally, and GitLab include:project/Catalog requires published component — violates the v1 no-separate-publication constraint. Org-standardization benefit irrelevant for single-repo adopters (the current audience).
    verdict: fail
