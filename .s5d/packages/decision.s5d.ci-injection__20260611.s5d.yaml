- id: composite-action-in-s5d-repo
  title: Composite action in s5d repo
  content: 's5d ci init writes a thin workflow that references a composite action living in the s5d repo subdirectory (uses: system5-dev/s5d/.github/actions/s5d@<tag>). Check logic centrally maintained; user workflows stay minimal. GitLab equivalent: include:remote fragment.'
  scope: ci injection
  kind: system
  layer: invalid
  r_eff: null
  evidence:
  - id: 20260611-external-composite-action-in-s5d-repo
    type: external
    content: Subdirectory composite action is referencable cross-repo (owner/repo/path@ref) but 2026 supply-chain standard pins 40-char SHA — users do not auto-receive updates, erasing the central-maintenance benefit; GitLab still needs a separate generated fragment (CI/CD Catalog requires publishing) → two mechanisms instead of one. Adds a cross-repo supply-chain edge for zero v1 gain.
    verdict: fail
    valid_until: 2026-09-09T06:33:24.635358+00:00
