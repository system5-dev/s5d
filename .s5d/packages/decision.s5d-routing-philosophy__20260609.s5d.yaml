- id: full-extraction-skill-calls-s5d-route-only
  title: Full extraction — skill calls s5d_route only
  content: Remove prose routing from the skill; the agent always calls s5d_route and obeys it. One deterministic source, no LLM routing. Simplest contract, but inherits every keyword-classifier blind spot directly.
  scope: S5D Route stage — tier+mode classification
  kind: system
  layer: invalid
  r_eff: null
  evidence:
  - id: 20260609-internal-full-extraction-skill-calls-s5d-route-only
    type: internal
    content: Full extraction would force the skill to defer to s5d_route, which the battery proves returns lightweight for non-English and for "X and Y" multi-domain — a direct regression versus the LLM's correct semantic routing observed in the probes. Refutes full-extraction as the choice without first improving the router.
