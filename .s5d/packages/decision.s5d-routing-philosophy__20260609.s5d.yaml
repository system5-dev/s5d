hypotheses:
- id: llm-primary-with-deterministic-cross-check
  title: LLM-primary with deterministic cross-check
  content: The agent reads the request semantically and routes (primary); s5d_route, the keyword classifier, runs as a cross-check. On disagreement — especially non-English or "X and Y" multi-domain — the agent trusts its semantic read and notes the divergence. Router output format (entry_stage) is aligned so the check is comparable.
  scope: S5D Route stage — tier+mode classification
  kind: system
  layer: L1
  r_eff: null
  evidence:
  - id: 20260609-internal-llm-primary-with-deterministic-cross-check
    type: internal
    content: 'Verified cross-check this session: agentic probe P4 routed the Russian request "добавить корзину покупок и оформление заказа" to high/prepare (checkout→payment), while the deterministic s5d_route returned lightweight/prepare (English-keyword-only). The 15-prompt router battery confirmed the same blind spot for "X and Y" multi-domain and for "config change for auth" (out-of-scope beats high). LLM-primary keeps the correct semantic routing; the blind spots are pinned in rust/tests/routing_behavior.rs::router_known_limitations and bounded by the SKILL.md cross-check note.'
    verdict: pass
