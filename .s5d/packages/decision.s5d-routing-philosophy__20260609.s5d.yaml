- id: improve-the-deterministic-router-then-lean-on-it
  title: Improve the deterministic router, then lean on it
  content: Extend router.rs with multilingual keywords, "X and Y" conjunction detection, and richer signals; then make s5d_route the source of truth the skill defers to. Determinism and reproducibility, at the cost of carrying a growing keyword/NLP surface in Rust.
  scope: S5D Route stage — tier+mode classification
  kind: system
  layer: invalid
  r_eff: null
  evidence:
  - id: 20260609-internal-improve-the-deterministic-router-then-lean-on-it
    type: internal
    content: Viable but deferred. Improving the router means carrying a multilingual + "X and Y" conjunction + semantic keyword surface in Rust, which drifts and needs maintenance. Under current evidence the LLM already routes these cases correctly (see h1 probe P4 + battery), so the maintenance cost is not justified now. Loses to h1 on cost/benefit; remains the documented fallback to promote if s5d_route ever becomes an authoritative consumer.
