context: |
  ## Problem
  The workflow shell can start/accept phases and emit Ralph task packages, but S5D cannot yet supervise a phase run through a user-approved external engine command and persist the execution trace.

  ## Goal
  Add the smallest external-engine phase run path: config declares approved command templates, `s5d phase run` executes one template for the active phase, and the record stores run metadata plus artifact hash.

  ## Privacy
  Classification: Internal
workflow:
  mode: plan
  target_architecture:
    summary: S5D core remains a thin supervisor over workflow state; provider-specific behavior lives behind external command templates and run artifacts.
    invariants:
    - S5D never stores provider credentials or secrets in spec/record/config.
    - S5D records execution facts and artifact hashes, not chat state as authoritative architecture.
    - Phase execution requires an approved-or-later spec and an active phase.
    - Human phase acceptance remains separate from engine completion.
  delivery_strategy:
    summary: Extend the existing workflow phase surface instead of introducing a new orchestration subsystem.
    rationale: A single command-template runner validates the state model before adding provider-specific adapters or parallel multi-engine hypothesis generation.
  resources: null
