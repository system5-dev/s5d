s5d: '1.0'
id: feat.s5d.pretool-enforcement
version: 1.0.0
product: s5d
tier: lightweight
allow_update: true
meta:
  title: PreToolUse enforcement layer for S5D mandatory mode
  authors: [roman, diana]
  date: 2026-04-27
  tickets: []
  adrs: []
  renames: []
context: |
  ## Problem
  Today S5D enforcement is documentation-only plus a single commit-time gate
  (`hooks/require-spec.sh`). By the time `git commit` fires, the agent has
  already produced potentially significant code without an approved spec.
  The "S5D MANDATORY" wording in agents_block is advisory — there is no
  mechanical block on Edit/Write/MultiEdit before code starts landing.

  Concrete failure mode observed in this very session: feature work
  (multi-runtime AGENTS inject + MANDATORY wording) was implemented
  directly without a prior spec, then noted retroactively in the commit
  body. The rule we just declared was violated by the commit that
  declared it.

  ## Goal
  Make S5D non-bypassable for non-trivial work without ceremony for trivial
  work. Three mechanical layers (UserPromptSubmit nudge → PreToolUse Edit
  gate → existing pre-commit fallback) so the agent literally cannot
  produce non-trivial code without an approved spec, while small fixes
  and docs remain frictionless.

  ## Privacy
  Classification: Internal (s5d open-source project).
workflow:
  mode: plan
  target_architecture:
    summary: |
      Three-layer enforcement, each a Claude Code / Codex / Gemini hook
      that ships with `s5d init` and is registered idempotently:

      L1 — UserPromptSubmit (advisory):
        Runs `s5d route <prompt>`. If classified as non-trivial AND no
        approved spec exists in `.s5d/packages/`, injects a system
        reminder: "S5D mandatory; run s5d_new before any Edit/Write."
        Never blocks the prompt itself.

      L2 — PreToolUse(Edit|Write|MultiEdit) (HARD GATE — the new piece):
        Pure Rust — NO shell wrapper. The hook command in the project's
        hooks.json is `s5d hook pretool-edit` directly (subcommand of the
        Rust binary). Reads Claude Code hook JSON from stdin, extracts
        file_path + session_id, calls the gate logic. Decision tree:
          1. If `.s5d/` does not exist in project → approve (s5d not adopted).
          2. If file path is in trivial allowlist (docs, config, tests,
             lockfiles, .gitignore, .env*) → approve.
          3. If file is under a path covered by an approved spec's
             `affects:` list → approve.
          4. If accumulated session edits to non-trivial source files
             exceed the threshold (default 30 LOC OR 4 distinct files)
             → block with reason: "non-trivial scope without spec; run
             s5d_new <feature-id> first or s5d note for one-off."
          5. Otherwise → approve, increment session counter.

      L3 — PreToolUse(Bash) require-spec.sh (existing — final net):
        Already in place. Catches `git commit` if L1+L2 were bypassed.

      Bypass: explicit `S5D_BYPASS=1` env var per-invocation OR
      `s5d note <rationale>` quick-spec for one-off justified changes
      that are too small to warrant a full spec but cross the threshold.
      No flag-file bypass — too easy to forget on disk.

      Session state: `.s5d/.session-counter.json` keyed by Claude session
      id (env var) tracking { files: [], loc: int, started: ts }. Reset
      on session end or after spec approval.
    invariants:
    - L2 hook never blocks if .s5d/ directory does not exist (opt-in per project)
    - Trivial allowlist match short-circuits before any other check
    - Session counter persists per-Claude-session, not globally
    - S5D_BYPASS=1 always wins (last-resort escape hatch)
    - Threshold values (30 LOC, 4 files) configurable via .s5d/config.toml
  delivery_strategy:
    summary: |
      Vertical slice: ship L2 first (the missing piece), refine L1 and
      threshold tuning after observing real friction. L3 stays as-is.
      Phase 1 builds the gate command + hook installer + happy-path tests.
      Phase 2 wires session counter and bypass mechanism. Phase 3 adds
      L1 advisory injection (lower-risk because non-blocking).
    rationale: |
      L2 is the actual enforcement; L1 is polish. Shipping L2 first means
      enforcement begins working immediately; L1 reduces user friction
      later. Reversed order would ship friction without enforcement.
  resources: null
  role_map:
    verifier: reviewer
    implementer: coder
    owner: human
    reviewer: reviewer
  review_policy:
    cross_model_required: true
    required_on: [build]
  structure_outline:
    summary: |
      Pure-Rust hook chain — NO shell wrappers. Two Rust subcommands:
      (1) `s5d gate edit` (Phase 1) — pure decision function exposed via CLI
      for testing and direct invocation;
      (2) `s5d hook pretool-edit` (Phase 2) — the actual hook entrypoint
      that reads Claude Code hook JSON from stdin, parses tool_input to
      extract file_path + session_id, computes loc_delta from the edit
      payload, calls evaluate_edit, writes JSON decision to stdout.
      Installer extension in `s5d init` registers the hook command
      string `s5d hook pretool-edit` directly in the project's
      hooks.json — no `bash ${CLAUDE_PLUGIN_ROOT}/...sh` indirection.
    signatures:
    - "fn cmd_gate_edit(args: GateEditArgs) -> Result<GateDecision>"
    - "fn evaluate_edit(project: &Project, file: &Path, session: &SessionState) -> GateDecision"
    - "fn load_session_state(session_id: &str) -> Result<SessionState>"
    - "fn save_session_state(session_id: &str, state: &SessionState) -> Result<()>"
    - "fn matches_trivial_allowlist(path: &Path) -> bool"
    - "fn covered_by_spec(project: &Project, file: &Path) -> Option<SpecId>"
    types:
    - "enum GateDecision { Approve, Block { reason: String } }"
    - "struct SessionState { files: BTreeSet<PathBuf>, loc_delta: usize, started: DateTime }"
    - "struct GateEditArgs { file: PathBuf, loc_delta: Option<usize>, session_id: Option<String> }"
    - "struct ThresholdConfig { max_loc: usize, max_files: usize, allowlist_globs: Vec<String> }"
    files:
    - "rust/src/gate.rs — Phase 1, done: evaluate_edit, session state, allowlist"
    - "rust/src/bin/s5d.rs — Phase 1, done: `gate edit`/`gate reset` subcommands"
    - "rust/src/bin/s5d.rs — Phase 2: `hook pretool-edit` subcommand reading stdin JSON"
    - "rust/src/hooks_json.rs — Phase 2 new module: ensure_pretool_hook_in_hooks_json mirroring ensure_agents_md pattern; idempotent JSON-merge over hooks.json in .claude-plugin/, .codex-plugin/, project root"
    - "rust/src/bin/s5d.rs — Phase 2: extend run_init to call hooks_json installer"
    - "EXPLICITLY EXCLUDED: NO shell scripts. NO hooks/*.sh files added or referenced."
  execution_mode:
    engine: manual
    max_iterations: null
    stop_conditions:
    - Phase acceptance reached
    - Approved scope exhausted
    - New decision required
  phases:
  - id: gate-core
    title: L2 gate command + module + tests
    scope: |
      Implement `s5d gate edit` subcommand and `gate.rs` module. No hook
      registration yet — pure CLI. End-to-end: input file path → output
      JSON GateDecision. Unit tests for each branch (no .s5d/, allowlist
      hit, spec coverage hit, threshold crossed, threshold not crossed).
      Vertical slice: this alone is testable from Bash without any agent
      runtime.
    roles: [implementer, reviewer]
    acceptance:
    - "`s5d gate edit --file <p>` returns valid GateDecision JSON"
    - 6 unit tests cover all decision branches
    - "`cargo test gate` green"
    rollback:
    - Revert module if integration proves wrong abstraction
  - id: hook-wiring
    title: Pure-Rust hook entrypoint + hooks.json installer
    scope: |
      NO shell — pure Rust. Two pieces:
      (a) `s5d hook pretool-edit` Rust subcommand: reads Claude Code
          hook JSON from stdin, extracts tool_input.file_path +
          session_id, computes loc_delta from the edit payload (Edit
          tool: count newlines in new_string minus old_string; Write:
          count newlines in content), calls evaluate_edit, prints JSON
          decision to stdout. Honors S5D_BYPASS=1.
      (b) `ensure_pretool_hook_in_hooks_json` installer in s5d init:
          mirrors ensure_agents_md pattern. Targets hooks.json in
          .claude-plugin/ and .codex-plugin/ project subdirs (created
          if absent). Registers PreToolUse with matcher Edit|Write|MultiEdit
          pointing at command string `s5d hook pretool-edit` directly.
          Idempotent via JSON merge keyed on the command string.
    roles: [implementer, reviewer]
    acceptance:
    - "`s5d hook pretool-edit < claude_hook_input.json` returns valid JSON"
    - Manual smoke in tmp project — Edit blocked correctly when threshold crossed
    - Hook registration idempotent (second `s5d init` → AlreadyInstalled)
    - Bypass via `S5D_BYPASS=1 claude ...` works
    - No new files under `hooks/*.sh` (correctness check via `git diff --stat`)
    rollback:
    - Remove hook entry from hooks.json; `s5d hook pretool-edit` stays harmless as standalone command
  - id: l1-advisory
    title: UserPromptSubmit advisory layer
    scope: |
      Add `s5d route` invocation in UserPromptSubmit hook that injects
      reminder when classification is non-trivial without active spec.
      Non-blocking. Shipped after L2 because L2 is the actual gate.
    roles: [implementer]
    acceptance:
    - Reminder appears in agent context for non-trivial prompts
    - No-op for trivial prompts (no context noise)
    rollback:
    - Remove hook entry; L2 still enforces
  - id: measure
    title: Live observation
    scope: |
      Use enforcement on s5d itself + Diana for one week. Track:
      false-blocks (forced bypass count), missed non-trivial work
      (commits without spec that weren't blocked), threshold tuning.
    roles: [owner, verifier]
    acceptance:
    - "<2 forced bypasses per week (signal threshold may be too tight)"
    - "0 non-trivial commits without spec (signal gate works)"
    - Threshold values updated in `.s5d/config.toml` if needed
    rollback:
    - Loosen thresholds OR add path patterns to allowlist
