hypotheses:
- id: h1-granularity
  title: Threshold-based gating granularity
  content: |
    Threshold-based gating (30 LOC OR 4 files accumulated per session)
    catches the right cases without blocking normal small fixes. Strict
    per-Edit gating would force a spec for every single-line change;
    path-based gating alone misses cross-cutting refactors.
    Falsifiable: ≥2 forced bypasses per week on s5d + Diana use, OR
    non-trivial commits land without a referenced spec → hypothesis
    rejected, narrow allowlist or lower threshold.
  scope: L2 gate decision branch 4 (threshold check)
  kind: behavior
  layer: L1
- id: h2-bypass
  title: Single env-var bypass mechanism
  content: |
    Single env-var bypass (S5D_BYPASS=1) is sufficient. Flag-file bypass
    is too easy to leave on disk; no-bypass is impractical when truly
    one-off work crosses threshold.
    Falsifiable: bypass count >1 per week per active project, OR users
    reach for flag-file workaround → revisit with lighter alternative.
  scope: L2 gate bypass mechanism
  kind: design
  layer: L1
- id: h3-installer-scope
  title: Reuse existing init-time hook installer
  content: |
    The new hook installs via the same `s5d init` flow as the existing
    pre-commit hook — no separate `s5d gate install` command. Scope
    stays project-local (.git/hooks + project hooks.json), never
    user-global. Existing installer pattern (s5d.rs:1668-1695)
    generalizes cleanly to a second hook target.
    Falsifiable: installer logic forks into hook-specific branches that
    don't share code → extract a generic installer abstraction first.
  scope: hook-wiring phase, s5d init UX
  kind: design
  layer: L1
