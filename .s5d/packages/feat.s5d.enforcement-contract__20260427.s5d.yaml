context: |
  ## Problem
  S5D generated policy says non-trivial work is mandatory and has "no exceptions",
  but hook enforcement still has weak edges: malformed PreToolUse envelopes are
  approved, and the bypass escape hatch is described like an ordinary option.
  That creates false confidence: the social contract sounds stronger than the
  runtime contract.

  ## Goal
  Align the contract with behavior using the smallest change:
  - fail closed for malformed PreToolUse enforcement envelopes;
  - keep S5D_BYPASS=1 as an explicit break-glass escape hatch, not routine flow;
  - update generated/advisory wording so "mandatory" and "break-glass" are both
    true and test-covered.

  ## Privacy
  Classification: Internal
workflow:
  mode: plan
  target_architecture:
    summary: PreToolUse enforcement blocks malformed enforcement input and generated policy text describes bypass as explicit break-glass.
    invariants:
    - Malformed PreToolUse Edit/Write/MultiEdit hook input blocks, because the gate cannot verify scope.
    - Malformed PreToolUse Bash commit hook input blocks for require-spec and staged-spec validation entrypoints.
    - UserPromptSubmit remains advisory and fail-silent on malformed input.
    - S5D_BYPASS=1 remains available only as an explicit break-glass escape hatch.
  delivery_strategy:
    summary: Tighten hook parsing and wording in place, then add focused tests around malformed input and generated policy text.
