- id: cli-mediated-wiring-skills-emit-consume-s5d-through-the-existing-contract
  title: CLI-mediated wiring — skills emit/consume S5D through the existing contract
  content: 'Co-locate + distribute (H1''s mechanical part), AND make the producer skills route through the s5d CLI/MCP instead of hand-rolling YAML. system-design runs `s5d new` + `s5d decision decide`; domain-refactor emits its decision skeleton via `s5d new`; scenario-mine injects acceptance via a command path; security-scan uses `s5d_waiver` instead of writing .s5d/security-waivers.yaml directly; e2e-tests/scenario-mine keep reading .s5d/scenarios. Source of truth becomes the Rust schema (validated, drift-checkable). No schema extension — uses the contract that already exists. Matches Roman''s intent: skills make decisions/checkpoints inside S5D''s ecosystem.'
  scope: 'skill behavior: producers call s5d CLI/MCP; schema unchanged'
  kind: system
  layer: L1
  r_eff: null
  evidence:
  - id: 20260529-internal-cli-mediated-wiring-skills-emit-consume-s5d-through-the-existing-contract
    type: internal
    content: '[OBSERVED] The s5d CLI/MCP already exposes s5d_new, s5d_add_hypothesis, s5d_add_evidence, s5d_decide, and s5d_waiver — these cover system-design (new+decide), domain-refactor (new), and security-scan (waiver) directly, replacing their hand-rolled YAML with validated, drift-checkable artifacts. [INFERRED] One gap: no command found to inject use_case acceptance scenarios (scenario-mine writes .s5d/scenarios/acceptance/ YAML; acceptance is a YAML-layer injection under use_cases[], not a CLI verb). So scenario-mine''s acceptance path needs either a small new `s5d` subcommand or stays file-based for that one output. Everything else maps onto the existing contract with no schema change.'
    verdict: refine
    valid_until: 2026-08-27T14:51:04.315213+00:00
    carrier_ref: null
    formality: 4
    claim_scope:
    - CLI coverage for skill emission
    congruence_level: null
    reliability: 0.75
    refine_kind: specialise
  - id: 20260529-internal-cli-mediated-wiring-skills-emit-consume-s5d-through-the-existing-contract
    type: internal
    content: '[OBSERVED] Core producer mapping holds on the existing contract: system-design''s decision-ADR → s5d_new + s5d_add_hypothesis + s5d_decide; domain-refactor''s decision skeleton → s5d_new; security-scan''s .s5d/security-waivers.yaml → s5d_waiver. These three are the only skills that currently WRITE S5D decision/waiver artifacts, and all three map onto CLI/MCP verbs that exist today with no schema change. [INFERRED] The earlier refine (acceptance-injection for scenario-mine) is a narrower, separable scope: scenario-mine''s main outputs are .feature files (no S5D verb needed); only the optional acceptance-snippet path lacks a verb, and it can stay file-based or get a ~30 LOC subcommand without affecting this decision. The integration depth itself (route producers through the contract) is sound and adoptable now.'
