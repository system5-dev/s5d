- id: schema-extension-first-class-skill-provenance-checkpoints-in-the-data-model
  title: Schema extension — first-class skill provenance + checkpoints in the data model
  content: 'Everything in H2, plus extend the Rust spec schema (rust/src/models.rs): add skill provenance to HypothesisEvidence (which skill produced this evidence + its report ref), and a first-class checkpoint/skill-report artifact attached to a spec so a skill run (e.g. security-scan gate, scaling-review) becomes data the schema knows about, not a freeform file. Skills become first-class evidence producers S5D can validate, trace, and drift-check. Heaviest: backward-compat risk on existing specs, bloats the thin layer, but is the only path if we want skill runs to be queryable/traceable S5D objects.'
  scope: Rust schema + CLI + skill behavior; affects all existing specs (backward compat)
  kind: system
  layer: invalid
  r_eff: null
  evidence:
  - id: 20260529-internal-schema-extension-first-class-skill-provenance-checkpoints-in-the-data-model
    type: internal
    content: '[OBSERVED] rust/src/models.rs has zero skill/checkpoint/report fields; evidence_type is already a freeform string (skills can attach typed evidence today without any schema change). [OBSERVED] ~13 specs are in ''operated'' state plus several applied/synced — a schema change adding non-Option fields risks deserialization breakage across the existing ledger. [INFERRED] No concrete capability (trace/drift/query) was identified that file-based or CLI-mediated coupling cannot deliver and that would justify a backward-compat-risking schema change NOW. The schema extension is a real option but currently a solution without a proven need.'
