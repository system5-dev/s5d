problem:
  signal: How deep should the 9 gigsure skills integrate into S5D when shipped as a first-class suite — co-located packaging only, CLI-mediated semantic wiring through the existing contract, or extending the spec schema with first-class skill provenance/checkpoints?
  constraints: []
  targets: []
  indicators: []
  goodhart_guard: null
  acceptance: |
    (1) All 9 skills ship from skills/ and link for Claude + Codex + Gemini via the existing install.sh loop (verified by a clean install run with >1 skill).
    (2) The 3 producer skills (system-design, domain-refactor, security-scan) emit S5D artifacts through the s5d CLI/MCP contract, not hand-rolled YAML.
    (3) No change to rust/src/models.rs; all existing specs still validate and import (zero backward-compat break).
    (4) The scenario-mine acceptance-injection path is explicitly resolved — either a new s5d verb or a documented file-based fallback — not left ambiguous.
  blast_radius: S5D distribution surface + 3 producer skills' emit paths; no schema/data-model change
  reversibility: high — packaging is revertible; CLI-mediation is per-skill and falls back to file-write
  status: backlog
hypotheses:
- id: thin-packaging-co-locate-and-ship-keep-file-based-coupling-as-is
  title: Thin packaging — co-locate and ship, keep file-based coupling as-is
  content: 'Move the 9 skills into skills/, extend install.sh SKILLS list + Claude/Codex plugin manifests (Gemini reads ~/.agents/skills natively, no change). Skills keep producing S5D artifacts exactly as they do now: direct YAML composition into .s5d/packages/, .s5d/scenarios/, .s5d/security-waivers.yaml. No CLI mediation, no schema change. S5D stays a thin layer; the suite is just bundled alongside it. Distribution is the only thing that changes.'
  scope: distribution + skills/ layout; no behavioral or schema change
  kind: system
  layer: L1
  r_eff: null
  evidence:
  - id: 20260529-internal-thin-packaging-co-locate-and-ship-keep-file-based-coupling-as-is
    type: internal
    content: '[OBSERVED] install.sh loops over $SKILLS and link_skill already handles N skills; .claude-plugin and .codex-plugin skills[] are arrays. Mechanical packaging is ~10 LOC across 3 files, zero risk, loop just never exercised with >1. [INFERRED] But H1 preserves the existing fragility: system-design/domain-refactor/scenario-mine hand-roll spec YAML with NO validation against rust/src/models.rs (the Rust source of truth), so shipped-under-S5D skills can silently drift from the schema they claim to target.'
    verdict: pass
