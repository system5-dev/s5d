context: '## Problem

  31 top-level CLI commands; first-screen overload (Zen-of-Python: one obvious way).


  ## Goal

  Regroup related commands under decision/verify/apply/phase/admin while keeping old
  top-level names as hidden clap aliases. Visible top-level = 12 public commands.


  ## Scope

  rust/src/bin/s5d.rs, CLI tests, and human-facing command docs.


  ## Acceptance

  (i) all old commands continue to work by exact name as hidden aliases; (ii) `s5d
  --help` shows 12 visible top-level commands; (iii) unit, synthetic, and integration
  tests pass; (iv) MCP unchanged.


  ## Privacy

  Classification: Internal

  '
workflow:
  mode: plan
  target_architecture:
    summary: 'Visible top-level commands: init, new, decision, verify, apply, status,
      show, trace, phase, codebase, discover, admin. decision contains add-hypothesis/add-evidence/decide;
      verify contains validate/graph-check/check/run-gates; apply contains preview/approve/import/drift-check/reconcile/rollback/reflect;
      phase contains list/start/run/accept/loop/harness; admin contains install/update.
      Old top-level commands remain callable as hidden aliases.'
    invariants:
    - All hidden commands continue to work when invoked by exact name
    - cargo test passes — including standalone fixtures that use the old commands
    - No MCP tool name changes
