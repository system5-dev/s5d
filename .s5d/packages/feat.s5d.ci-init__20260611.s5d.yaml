context: '## Problem

  All S5D enforcement is local (pre-commit hook, CLI/MCP gates); `git push` bypasses
  it. PRs can merge with invalid specs, undeclared architecture edges, or drifted
  state.


  ## Goal

  `s5d ci init` generates a self-contained PR pipeline (GitHub Actions / GitLab CI)
  that installs the pinned release binary and runs `s5d ci exec` — built-in read-only
  checks only (validate, architecture for declaring specs, drift-check). Decision:
  decision.s5d.ci-injection (winner: generated-standalone-workflow).


  ## Privacy

  Classification: Internal

  '
workflow:
  mode: plan
  target_architecture:
    summary: 'CI generation and execution live in the compiled binary: rust/src/ci.rs
      holds templates (version-marked) and the built-in check orchestrator; thin CLI
      group `s5d ci init|check|exec` plus MCP parity tools. Generated config never
      embeds check logic — it installs a pinned binary and calls `s5d ci exec`, so
      checks evolve with the binary, not the template. gate_commands are structurally
      excluded from CI exec (trust boundary).'
    invariants:
    - Generated CI config contains no check logic beyond install + s5d ci exec
    - ci exec never executes config-defined gate_commands
    - Generated files carry a template-version marker; ci check detects staleness
      and user modification
    - ci init is idempotent; refuses to overwrite marker-less (user-owned) files without
      --force
  delivery_strategy:
    summary: 'Single slice: ci.rs module + CLI/MCP wiring + integration tests + docs;
      measure by running ci init on the s5d repo itself and a sandbox repo with a
      failing spec.'
    rationale: null
  resources: null
  role_map:
    reviewer: reviewer
    implementer: coder
    owner: human
    verifier: reviewer
  review_policy:
