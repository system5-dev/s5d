  phases:
  - id: prototype
    title: Prototype
    scope: Reduce unknowns before committed implementation
    roles:
    - owner
    - implementer
    acceptance:
    - Critical feasibility questions answered
    - Telemetry approach identified
    rollback:
    - Discard spike output if assumptions fail
  - id: build
    title: Build
    scope: Implement ci.rs (templates + exec orchestrator), CLI group, MCP parity,
      integration tests, docs
    roles:
    - implementer
    - reviewer
    acceptance:
    - ci init writes GitHub workflow / GitLab fragment with version marker; idempotent
      re-run
    - ci exec fails non-zero on invalid spec, architecture violation, or drift; green
      on clean repo
    - ci check reports stale/modified templates
    - cargo test green incl. new integration tests; fmt/clippy clean
    rollback:
    - Revert or reconcile if gates or review fail
  - id: measure
    title: Measure
    scope: 'Dogfood: run ci init in sandbox + against s5d repo; verify PR-blocking
      behavior end-to-end'
    roles:
    - owner
    - verifier
    acceptance:
    - 'Sandbox: broken spec → ci exec exit != 0; fixed → 0'
    - Generated workflow runs green on a real GitHub PR
    rollback:
    - Iterate or kill if evidence stays weak
