- id: s5d-repo-state-assurance-kernel-bmad-класс-внешний-skill-адаптер
  title: S5D = repo-state assurance kernel; BMAD-класс = внешний skill-адаптер
  content: 'S5D покрывает ПОДМНОЖЕСТВО control plane Operator Loop: repo-state / spec / evidence / gates / decision / drift / rollback. НЕ владеет feature-flags, ingestion телеметрии, CI-оркестрацией, alerting, takeover-триггерами, product-metric-решениями — линкует через telemetry_refs/ROC. BMAD-класс воркфлоу = ВНЕШНИЙ skill-слой, вызывающий MCP-инструменты S5D на границах spec/evidence/decision. Governance-precedence: гейты S5D решают допустимость продукции BMAD в репо, но BMAD — пир на facilitation/methodology-слое (elicitation+persona — отдельная способность, не сводится к role_map), не подчинённый. Фрейминг: "BMAD ведёт front-of-loop discovery; S5D связывает и верифицирует repo-state-обязательства".'
  scope: Позиционирование S5D относительно Operator Loop и BMAD-класса воркфлоу
  kind: system
  layer: L1
  r_eff: null
  evidence:
  - id: 20260613-gate-review-s5d-repo-state-assurance-kernel-bmad-класс-внешний-skill-адаптер
    type: gate:review
    content: 'Трибунал (Codex high + Gemini flash, Claude арбитр, 2026-06-13). Сошлись на этой гипотезе. Codex (REJECT исходной формулировки → третий вариант, file:line refs к rust/src/mcp.rs, models.rs, shape.rs, metamodel.md): S5D покрывает подмножество control plane (repo-state/spec/evidence/gates/decision/drift/rollback — реальные MCP-поверхности), НЕ владеет телеметрией/флагами/CI/триггерами; BMAD elicitation+persona не сводится к role_map (name→owner); граница control-plane≠orchestrator держится только если BMAD-воркфлоу — ВНЕШНИЙ skill-слой, вызывающий MCP S5D. Gemini (APPROVE): те же findings — "BMAD=HOW, S5D=WHAT", operational gap по телеметрии, (a) работает как producer вызывающий MCP. Арбитр: расхождение ярлыков мнимое, архитектура у обоих одна.'
