meta:
  title: self-update
  authors: []
  date: 2026-06-11
  tickets: []
  adrs: []
  renames: []
context: '## Problem

  Session-start hook only REPORTS update availability; applying requires a manual
  `s5d admin update apply`. Machines drift (Silaya stayed on alpha.7 until manually
  updated). Roman''s requirement: the skill must self-update.


  ## Goal

  `s5d update auto` (new hook entrypoint): when an update is available AND the checkout
  is safe to fast-forward (clean tree, on default branch, opt-out not set), spawn
  `update apply` DETACHED in the background (hook timeout is 10s; a cargo release
  build is minutes) and print one line. In every unsafe case, degrade to today''s
  prompt. Running sessions keep the old inode (tmp+rename install) and pick the new
  binary next session.


  ## Privacy

  Classification: Internal

  '
workflow:
  mode: plan
  target_architecture:
    summary: 'Self-update lives behind explicit safety guards in the compiled binary:
      auto-apply fires only on (update_available && clean tree && default branch &&
      S5D_AUTO_UPDATE != 0); anything else falls back to the visible prompt. The apply
      itself stays the existing audited path (fetch + pull --ff-only + relink skills
      + tmp+rename binary install). Detached spawn logs to ~/.s5d-update.log.'
    invariants:
    - Auto-apply never runs on a dirty tree or non-default branch — it degrades to
      the prompt
    - S5D_AUTO_UPDATE=0 disables auto-apply (prompt-only)
    - 'Hook never blocks: apply is spawned detached, hook returns immediately'
    - Apply path remains ff-only — local work is never rewritten
  delivery_strategy:
    summary: 'Single slice: guard fn + spawn in cmd_provision, CLI subcommand, hooks.json
      swap, tests for guard decisions, live verify on this machine.'
    rationale: null
  resources: null
  role_map:
