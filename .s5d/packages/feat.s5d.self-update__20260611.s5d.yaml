  phases:
  - id: prototype
    title: Prototype
    scope: Reduce unknowns before committed implementation
    roles:
    - owner
    - implementer
    acceptance:
    - Critical feasibility questions answered
    - Telemetry approach identified
    rollback:
    - Discard spike output if assumptions fail
  - id: build
    title: Build
    scope: Implement approved scope and pass local gates
    roles:
    - implementer
    - reviewer
    acceptance:
    - update auto with dirty tree / non-main branch / opt-out prints prompt, exits
      0, spawns nothing
    - update auto with clean+behind checkout spawns detached apply and returns under
      hook timeout
    - cargo test green, fmt/clippy clean
    rollback:
    - Revert or reconcile if gates or review fail
  - id: measure
    title: Measure
    scope: Collect telemetry and close the loop with an explicit verdict
    roles:
    - owner
    - verifier
    acceptance:
    - 'Live: machine behind a release self-updates on session start without blocking
      the session'
    rollback:
    - Iterate or kill if evidence stays weak
