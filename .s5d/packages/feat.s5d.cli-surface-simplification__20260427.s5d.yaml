context: |
  ## Problem
  The CLI exposes internal plumbing commands in the top-level help and lets
  `approve`/`import` complete without an explicit human identity. That makes
  the public surface noisier than the S5D lifecycle and weakens the trust
  separation contract.

  ## Goal
  Keep the visible CLI smaller: lifecycle/setup/recovery commands stay public,
  internal hook/MCP/bootstrap/fingerprint plumbing is hidden from help, and
  approval/import identity is explicit at the command boundary.

  ## Privacy
  Classification: Internal
workflow:
  mode: plan
  target_architecture:
    summary: Public help lists operator-facing lifecycle commands; internal entrypoints remain callable but hidden. Approval and import require explicit identity.
    invariants:
    - "`s5d approve` requires `--reviewer <name>`."
    - "`s5d import` and `s5d_import` require `verified_by`."
    - "`--force` may override same-person trust separation, but not missing identity."
    - Internal commands stay callable for hooks/integrations but are hidden from public help.
  delivery_strategy:
    summary: Remove default identity values, make verifier required, hide internal Clap subcommands, and add regression tests around help/output contracts.
    rationale: This narrows the existing CLI surface without moving commands or adding a new abstraction.
