problem: Product-intent architecture shaping must be governed by S5D itself, not delivered as a separate skill that bypasses S5D workflow enforcement.
hypotheses:
- id: h1-standalone-skill
  title: Keep Domain-Capability Design as a standalone skill
  content: |
    This keeps the artifact easy to install independently, but it splits product-intent shaping from the S5D lifecycle and weakens enforcement. It also contradicts the intended one-skill flow.
  scope: Skill packaging boundary
  kind: design
  layer: L1
- id: h2-s5d-internal-mode
  title: Integrate as an S5D internal operating mode
  content: |
    This keeps Domain-Capability Design inside the S5D Frame/Spec workflow while preserving context hygiene through a reference document. It is the selected path.
  scope: S5D skill workflow boundary
  kind: design
  layer: L1
- id: h3-inline-only
  title: Inline the whole mode into SKILL.md
  content: |
    This makes the mode impossible to miss, but bloats the default S5D skill context. A linked reference keeps the main workflow readable while making the mode canonical.
  scope: S5D skill context budget
  kind: design
  layer: L1
