context: |
  ## Problem
  Product-intent shaping was extracted as a standalone skill, but the intended target state is one S5D skill with internal agent modes.

  ## Goal
  Make Domain-Capability Design an S5D Frame/Spec operating mode: product intent becomes S5D-native domains, capabilities, use cases, components, contracts, and scope constraints before implementation.

  ## Repository Boundary
  Keep discovery and feature shaping in the current repository by default. Split into a monorepo or architecture repository only after the single-repo boundary becomes a verified bottleneck.

  ## Privacy
  Classification: Internal. This change affects local S5D skill instructions only and does not introduce user-data handling.
workflow:
  mode: plan
  target_architecture:
    summary: S5D remains the single skill; Domain-Capability Design is an internal Product Intent -> Spec mode documented under skills/s5d.
    invariants:
    - Product intent shaping is framed as S5D behavior, not a standalone methodology.
    - The mode outputs S5D-native artifacts and links.
    - Discovery init surveys GitHub/Jira/Figma/Miro/Linear/MCP availability before building the map.
    - Discovery state stays in the current repo unless cross-repo reuse or drift proves otherwise.
    - Agents validate the resulting spec through S5D commands before implementation.
    - No separate domain-capability-design skill is installed or referenced as canonical.
  delivery_strategy:
    summary: Add a S5D reference mode document, link it from the S5D skill, and remove the standalone skill artifact created during exploration.
    rationale: Keeps the guidance modular enough for context hygiene while preserving a single S5D workflow boundary.
  resources: null
  role_map:
    owner: human
    implementer: coder
    reviewer: reviewer
    verifier: reviewer
  review_policy:
    cross_model_required: false
    required_on: []
  structure_outline: null
  execution_mode:
    engine: manual
    max_iterations: null
    stop_conditions:
    - S5D spec no longer validates.
    - Domain-Capability Design drifts back into a separate skill.
    - User asks to redesign the S5D workflow boundary.
  phases:
  - id: shape
    title: Shape
    scope: Define Product Intent -> Domain-Capability Design as an S5D internal mode.
    roles:
    - owner
    - implementer
    acceptance:
    - S5D skill names the mode and its position in the flow.
    - The mode has a concise reference document under skills/s5d.
    - Discovery init records available primary sources and MCP connectors.
    rollback:
    - Remove the mode reference if it cannot be reconciled with S5D's metamodel.
  - id: build
    title: Build
    scope: Update skill files and remove the standalone skill artifact.
    roles:
    - implementer
    - reviewer
    acceptance:
    - skills/s5d/SKILL.md links to the mode.
    - skills/s5d/domain-capability-mode.md contains the operating contract.
    - skills/domain-capability-design is not a tracked skill artifact.
    rollback:
    - Restore the previous standalone skill only if Roman explicitly chooses separate installation.
  - id: verify
    title: Verify
    scope: Run S5D schema, graph, and architecture checks.
    roles:
    - verifier
    acceptance:
    - s5d validate passes.
    - s5d graph-check passes.
    - s5d check passes or reports an actionable limitation.
    rollback:
    - Fix the spec or reduce gates if a declared check is not applicable to skill docs.
