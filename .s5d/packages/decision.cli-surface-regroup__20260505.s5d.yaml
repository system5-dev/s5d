problem:
  signal: '31 public top-level commands violate Zen of Python: There should be one obvious way. First-screen overload makes the entry point feel arbitrary. Closely-related verbs (add-hypothesis/add-evidence/decide; validate/graph-check/check/run-gates; preview/approve/import/drift-check/reconcile/rollback/reflect) are siblings of unrelated verbs (init, status, trace).'
  constraints:
  - 'Backward-compatible: existing scripts/CI/docs invoking old top-level commands must keep working'
  - No new functionality — pure surface reshape
  - MCP tool names must remain stable (s5d_add_hypothesis etc.) — they are independent of CLI grouping
  - Test-fixture command strings must be updatable in one pass
  targets:
  - Reduce top-level command count to 8-12 (verb-noun groups for related operations)
  - Make the first-screen output communicate the canonical flow (Route→Frame→Decide→Spec→Build→Verify→Ship→Learn)
  indicators:
  - Top-level command count (observation, not optimization target — could be slightly higher if a regroup hurts ergonomics)
  - User-facing breakage reports (must stay zero — observation)
  - Hidden-alias count (informational)
  goodhart_guard: null
  acceptance: 'Re-grouped CLI is adopted iff: (i) all old commands continue to work as hidden aliases (no breakage); (ii) top-level help shows <=12 visible commands; (iii) cargo check + all tests pass; (iv) MCP tools unchanged; (v) self-trace via s5d trace still resolves correctly.'
  blast_radius: CLI surface only; no model/runtime change
  reversibility: high — surface change, hidden aliases preserve old paths; reversible by un-hiding
  status: framed
hypotheses:
- id: full-regroup-with-hidden-aliases
  title: Full regroup with hidden aliases
  content: 'Group 31 commands into 12 visible verbs: init/new/status/show/trace/decision (add-hypothesis,add-evidence,decide)/verify (validate,graph-check,check,run-gates)/apply (preview,approve,import,drift-check,reconcile,rollback,reflect)/phase (+loop,harness)/discover/codebase/admin (install,update). Old commands kept as #[command(hide=true)] aliases via clap. No CLI breakage.'
  scope: CLI surface
  kind: system
  layer: L2
  r_eff: null
  evidence:
  - id: 20260505-internal-full-regroup-with-hidden-aliases
    type: internal
    content: 'Clap supports #[command(hide=true)] for aliases — backward-compat is mechanical. Verb-noun grouping is idiomatic in major CLIs (git, kubectl, gh) and well understood. Reduces cognitive load on first-screen.'
