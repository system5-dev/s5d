note_rationale: 'Пересмотрено вторым трибуналом + 6 source-probes против реальных файлов s5d. Источник Goedel-Architect (arXiv 2606.06468v1, 4 Jun 2026, Princeton Language and Intelligence) ВЕРИФИЦИРОВАН по первоисточнику (PDF на диске) и прочтён Романом лично — ранняя ревизия ошибочно сочла его фантомом (index-lag WebSearch + устаревший training cutoff), исправлено. Реальная механика: blueprint = dependency-DAG лемм, параллельное закрытие узлов Lean-прувером, 2 диагноза провала (STATEMENT_WRONG / PROOF_TOO_HARD) драйвят ревизию глобального blueprint. Опровергнуто (из probes против s5d, НЕ из-за источника): mandatory-DAG (P1 — 85% спеков <3 компонентов), projection-из-spec (P2 — work-node-deps нет в схеме), 5-way-таксономия как операционализация refine_kind (P3 — ортогональны; реальная таксономия статьи = 2 диагноза), scoped-re-derive-без-графа (логическая ловушка). Граница (Gemini): s5d = control plane, НЕ task orchestrator. ВЫЖИЛО: "Structural Invalidation Pattern" — reasoning-guidance поверх СУЩЕСТВУЮЩЕГО graph_check (Tarjan SCC на domain edges), ноль новой схемы, opt-in.'
