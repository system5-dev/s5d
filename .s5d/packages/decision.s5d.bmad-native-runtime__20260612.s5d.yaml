    type: internal
    content: 'New global artifact types enter the alias/ownership/fingerprint machinery hardened literally today (RAN-491) — the biggest possible blast radius for the least incremental value: workflow.phases already model story-shaped execution units with acceptance and rollback per phase, so Story/Epic artifacts would be a second competing surface. PRD-to-epics planning (steal-list item 5) stays a Phase-3 candidate behind the schema-lite kernel.'
