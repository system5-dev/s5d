- id: commands-only-zero-schema-change
  title: Commands-only, zero schema change
  content: 'All three commands operate on files outside the spec schema: shape writes .s5d/discovery/shape-<slug>.md (non-state, like discovery artifacts), review writes evidence-dir reports, plan stories prints workflow.phases guidance. The kernel never enters sha-bound state; the existing problem card stays the only landing zone and the skill maps kernel to card manually as today.'
  scope: CLI+MCP commands only
  kind: system
  layer: L0
  r_eff: null
  evidence:
  - id: 20260612-internal-commands-only-zero-schema-change
    type: internal
    content: 'Zero fingerprint risk by construction, but the kernel stays outside sha-bound state — the Acceptance Auditor keeps depending on unbound markdown, which is exactly the failure mode adversarial-review.md warns about (markdown-only report is companion input, not a gate). The shape doctrine''s own rule that companion docs must not become lifecycle truth is violated in spirit: intake intent IS what approval should bind.'
