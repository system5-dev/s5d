problem:
  signal: How should BMAD shaping/planning/review capabilities become native S5D runtime without making companion docs lifecycle truth and without invalidating fingerprint baselines? (Phase 2 of the BMAD assimilation — Phase 1 shipped skill-layer docs only; benchmark steal-list items 1-4)
  constraints:
  - Companion documents must never become the source of lifecycle truth — shape-layer.md doctrine, non-negotiable
  - No fingerprint baseline invalidation — any new Spec field must keep the serialized form of existing specs byte-identical (RAN-491 lesson)
  - Thin layer — the runtime validates structure and routing, never authors product content; content quality stays with the agent/skill
  - CLI/MCP parity for every new command
  targets: []
  indicators: []
  goodhart_guard: null
  acceptance: (1) An intake kernel can be carried inside sha-bound approved state so the Acceptance Auditor reviews against bound intent, not loose markdown; (2) existing specs and baselines unaffected (serialization-compat pinned by test); (3) shape routing reuses the existing router; (4) review reports land in evidence surfaces that gates can consume; (5) stories reuse workflow.phases, no second modeling surface
  blast_radius: Spec schema (additive), validate, router callers, CLI+MCP command surface; no alias/ownership/fingerprint machinery changes
  reversibility: High — optional skip-serialized field plus new commands; removing them restores prior behavior, specs without kernels never change
  status: backlog
hypotheses:
- id: kernel-in-spec-schema-lite
  title: Kernel-in-spec, schema-lite
  content: 'Add intent_kernel (the 8 shape-layer fields: why, capabilities, constraints, non_goals, success_signal, assumptions, open_questions, companions) as an optional skip-serialized Spec field. s5d shape ingests a kernel, routes via the existing router, and scaffolds a spec with the kernel embedded — intake provenance becomes sha-bound approved state. Stories map onto the existing workflow.phases (no new artifact type). s5d review adversarial scaffolds the 3-layer report into .s5d/evidence/<spec>/ and binds via existing evidence/gate surfaces. Readiness = validator rules over kernel completeness.'
  scope: models.rs Spec, validate, router, CLI+MCP commands
  kind: system
  layer: L2
  r_eff: null
  evidence:
  - id: 20260612-internal-kernel-in-spec-schema-lite
    type: internal
    content: 'models.rs already uses skip_serializing_if=Option::is_none for additive optional fields (evidence provenance skill/agent) — the baseline-safe additive-schema pattern is established in this repo. Kernel-in-spec closes the Phase-1 gap adversarial-review.md names explicitly: the Acceptance Auditor layer needs accepted intent IN sha-bound state, while markdown-only companions are flagged as not-a-passing-gate. Stories reuse workflow.phases (observed in every scaffold: id/title/scope/acceptance/rollback per phase) — no second modeling surface. Caveat: fingerprint-neutrality of the new field is INFERRED until pinned by a serialization-compat test (implementation requirement).'
    verdict: pass
