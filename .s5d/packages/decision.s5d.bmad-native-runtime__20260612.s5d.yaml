    congruence_level: null
    reliability: 0.85
    refine_kind: null
  - id: 20260612-gate-review-kernel-in-spec-schema-lite
    type: gate:review
    content: 'Adversarial review, 5 probes: (1) kernel-duplicates-ProblemCard counter-argument resolved by role split — kernel is verbatim intake provenance, card is the operative control plane; the four fields with no home today (non_goals, assumptions, open_questions, companions) justify the struct, and no validator coupling is introduced; (2) tail failure — an older binary re-serializing a kernel-bearing spec silently drops the unknown field, but the sha chain catches the file change (approval invalidated), so loss is detected, not silent; (3) evidence weakness — fingerprint-neutrality is INFERRED until a serialization-compat test pins that an old-style spec under the new schema is fingerprint-identical (hard implementation requirement); (4) weakest link — runtime readiness checks validate structure and routing coherence only, truthfulness stays with the agent, matching thin-layer doctrine; (5) existing alternatives — the router already classifies, so s5d shape must reuse route() internals, and review must reuse evidence-dir plus gate:review surfaces rather than invent parallel ones. No fatal flaw.'
    verdict: pass
