- id: full-bmad-artifact-model
  title: Full BMAD artifact model
  content: First-class Story/Epic artifact types in artifacts, a companion registry in links, and readiness as a new gate kind. Maximum native PRD-to-stories parity with BMAD (T08), at the cost of new global artifact types entering the alias/ownership/fingerprint machinery and a second modeling surface competing with workflow.phases.
  scope: metamodel artifacts/links/gates, alias table, import
  kind: system
  layer: L0
  r_eff: null
  evidence:
