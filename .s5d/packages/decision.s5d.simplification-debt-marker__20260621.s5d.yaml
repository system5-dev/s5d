- id: h4-null-rely-on-todo-adversarial-review-add-nothing
  title: 'H4 — Null: rely on TODO + adversarial review, add nothing'
  content: 'Keep the status quo: Constitution #3 already mandates marking; trust code review / adversarial review to catch unmarked or trigger-less shortcuts. No new marker, no new command. Honest baseline to beat. Weakest link: this is exactly the state the signal indicts — nothing harvests or flags, so markers (when written at all) rot silently and review has no checklist surface to audit against. Fails the "trigger-less markers are detectable" target by construction.'
