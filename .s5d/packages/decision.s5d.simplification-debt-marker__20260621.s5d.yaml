problem:
  signal: 'Constitution #3 mandates "temporary measures... explicitly marked, tightly scoped, paired with a removal plan", but a grep over skills/ rust/ hooks/ shows zero simplification markers and no mechanism to mark, collect, or flag them — the principle has no instrument. Ponytail (github.com/DietrichGebert/ponytail) demonstrates the missing piece: a grep-able inline marker naming the срезанный ceiling + revisit trigger, plus a harvest command that collects them into a debt ledger and flags trigger-less ones as "rot silently".'
  constraints:
  - Thin assurance only — no orchestration
  - no sequencing; consistent with control-plane≠orchestrator boundary
  - Marker capture must be low-friction at the point the cut is made (mid-implementation)
  - not require a full spec edit per simplification
  - Read-only harvest — reporting must change nothing
  - Must not duplicate the existing TODO/FIXME convention into a parallel rotting store
  targets:
  - low capture friction at cut-site
  - trigger-less markers are detectable not silent
  - markers bind to S5D repo-state (spec/component/ledger) not a free-floating parallel store
  indicators: []
  goodhart_guard: null
  acceptance: 'Decision names: (1) the marker format and where it lives (code comment vs spec field); (2) how markers are collected and trigger-less ones flagged; (3) the link to s5d''s existing repo-state surface (ledger / ownership-derivation component mapping / trace), consistent with assurance-kernel-positioning (S5D owns repo-state/evidence/drift, stays thin, not an orchestrator). A trigger-less or unbound marker must be detectable by a read-only command.'
  blast_radius: null
  reversibility: null
  status: backlog
hypotheses:
- id: h1-inline-grep-marker-read-only-harvest-ponytail-port
  title: H1 — Inline grep-marker + read-only harvest (ponytail port)
  content: 'Port ponytail directly: a code comment marker `s5d:debt(ceiling="...", trigger="...")` written at the cut-site; a read-only `s5d debt` command greps the tree, groups by file, and flags markers missing a trigger as `no-trigger`. Marker lives only in code; harvest is a stateless report. Lowest friction, closest to source. Weakest link: the debt store is a parallel grep universe disconnected from S5D''s ledger/trace — it doesn''t bind to spec or component, so it can''t participate in drift/evidence the way the rest of S5D does.'
  scope: marker capture + harvest, code-local only
  kind: system
  layer: invalid
  r_eff: null
  evidence:
  - id: 20260621-internal-h1-inline-grep-marker-read-only-harvest-ponytail-port
    type: internal
    content: 'Decomposition: marker(code) + grep(harvest) + no-trigger flag. Meets low-friction and trigger-less-detectable targets. Fails the "binds to S5D repo-state" target and the "no parallel rotting store" constraint: a flat grep report keyed by file has no path to spec/component/ledger, so debt cannot enter drift/trace/evidence like the rest of S5D. Strictly dominated by H3, which adds the binding for one lookup.'
