- id: h3-hybrid-inline-marker-is-source-of-truth-harvest-reconciles-into-ledger-via-ownership-derivation
  title: 'H3 — Hybrid: inline marker is source of truth, harvest reconciles into ledger via ownership-derivation'
  content: 'Inline `s5d:debt(ceiling, trigger)` comment is written at the cut-site (ponytail''s low friction). `s5d debt` harvests markers and maps each file path to its owning component/spec using the existing ownership-derivation (file→component→spec already in the ledger), emitting a debt view keyed by spec/component; trigger-less or unowned markers are flagged. Optionally a `--check` mode for CI/hook (non-zero on trigger-less markers). Marries ponytail''s cut-site capture with S5D''s repo-state binding — the same shape as drift-check (live code vs recorded state). Weakest link: ownership-derivation only resolves paths already mapped to a component; debt in an unmapped file surfaces as `unowned` rather than silently dropping — acceptable and itself a signal.'
  scope: inline marker + harvest reconciled to ledger/components
  kind: system
  layer: L1
  r_eff: null
  evidence:
  - id: 20260621-internal-h3-hybrid-inline-marker-is-source-of-truth-harvest-reconciles-into-ledger-via-ownership-derivation
    type: internal
    content: 'Decomposition: inline marker(cut-site) + harvest + path→component map (reuse of shipped ownership-derivation, decision.s5d.ownership-derivation applied/synced) + no-trigger/unowned flags + opt-in --check. Meets all three targets: low friction (comment at cut-site), trigger-less detectable (flag), repo-state binding (component/spec via existing map). Reconcile shape mirrors the existing drift-check (live code vs recorded state). Weakest link = path→component completeness; unmapped debt surfaces as `unowned`, a self-reporting signal not a silent drop. Net new machinery beyond H1 is one map lookup.'
