- id: h2-debt-as-first-class-spec-evidence-no-code-comment
  title: H2 — Debt as first-class spec evidence (no code comment)
  content: 'Each intentional simplification is registered as an S5D artifact: a `debt:` entry in the feature spec or an evidence-type binding (ceiling + trigger + claim-scope) recorded in the ledger and reachable via `s5d trace`. No free-floating comments. Strongest provenance, fully inside the evidence chain. Weakest link: high friction — every cut needs a spec edit, which invalidates approval SHA; misses simplifications discovered mid-implementation that don''t merit a spec; violates the "low-friction at cut-site" target.'
  scope: debt as spec/evidence artifact, no inline marker
  kind: system
  layer: invalid
  r_eff: null
  evidence:
  - id: 20260621-internal-h2-debt-as-first-class-spec-evidence-no-code-comment
    type: internal
    content: 'Decomposition: debt registered as spec field / evidence binding, reachable via trace. Maximizes provenance but fails the "low-friction at cut-site" target: every simplification requires a spec edit, which changes the spec sha256 and invalidates any prior approval (documented S5D gotcha). Mid-implementation cuts that don''t merit a spec get dropped entirely. High friction predicts under-use → markers not written at all.'
