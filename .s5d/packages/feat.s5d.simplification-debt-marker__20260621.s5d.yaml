problem:
  signal: 'decision.s5d.simplification-debt-marker chose H3: an inline cut-site marker harvested into a debt view bound to S5D repo-state. No implementation exists — Constitution #3''s "explicitly marked temporary measures" still has no instrument.'
  constraints:
  - Read-only — no writes to ledger/aliases/files
  - Reuse the existing .s5d/codebase coverage snapshot for path→component; do not reimplement file→component
  - No new dependency — grep via existing repo-walk + regex already in the binary
  - 'Marker regex is comment-syntax-agnostic (// and # at minimum)'
  targets:
  - low capture friction
  - trigger-less + unowned detectable
  - zero new deps
  indicators: []
  goodhart_guard: null
  acceptance: 'A read-only `s5d debt` command exists that: greps `s5d:debt(ceiling=..., trigger=...)` markers across the tree (skipping .git/target/node_modules), maps each marker''s file path to its owning component/spec via the codebase coverage snapshot, prints a report grouped by spec/component, flags markers with an empty/absent trigger as `no-trigger` and markers in files not covered by any component as `unowned`. `--check` returns non-zero when any `no-trigger` marker exists. Running it changes nothing. A self-check test asserts harvest on a fixture tree finds the marker, flags a trigger-less one, and exits non-zero under --check.'
