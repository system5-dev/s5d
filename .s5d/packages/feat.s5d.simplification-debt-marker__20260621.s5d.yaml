context: |
  ## Problem
  decision.s5d.simplification-debt-marker (H3) adopted an inline cut-site debt
  marker harvested into a repo-state-bound view, but no code implements it.
  Constitution #3 still has no instrument to mark/collect/flag temporary measures.

  ## Goal
  Ship a read-only `s5d debt` command that harvests `s5d:debt(ceiling, trigger)`
  markers, binds each to its owning component/spec via the codebase coverage
  snapshot, and flags `no-trigger` / `unowned` markers; `--check` exits non-zero
  on any `no-trigger` marker.

  ## Privacy
  Classification: Internal
workflow:
  mode: plan
  target_architecture:
    summary: A read-only `s5d debt` subcommand in the s5d binary harvests inline markers, resolves path→component via the codebase coverage snapshot, and reports grouped by spec/component with no-trigger and unowned flags; --check gates CI/hooks.
    invariants:
    - Harvest never writes to ledger, aliases, or source files
    - path→component resolution reuses the codebase snapshot, not a reimplementation
    - A marker with an empty trigger is always reported as no-trigger
  delivery_strategy:
    summary: Add a new debt.rs module with the harvest+classify logic, wire one subcommand in s5d.rs and one MCP tool in mcp.rs, cover with a fixture test in standalone_repos.rs.
    rationale: One new module keeps the harvest logic isolated and unit-testable; CLI/MCP are thin wrappers, matching the existing command surface.
