- id: external-offline-optimizer-pr-s5d-gates
  title: External offline optimizer → PR → s5d gates
  content: Keep the SkillOpt optimizer fully outside s5d as a standalone offline tool (separate repo/script + optimizer model) that emits a candidate SKILL.md plus a benchmark report; the only s5d touchpoint is the normal review/gate path — the candidate lands as a PR, CI runs s5d checks, and a human imports it if `s5d run benchmark` shows improvement. s5d gains zero new code; the optimizer is a black box that produces evidence s5d already knows how to gate. Maximally preserves the control-plane boundary (s5d never sees the loop) at the cost of no first-class integration, no Mandate reuse, and weaker provenance linking edits to rollouts.
  scope: external tool; PR/CI gate; no s5d code change
  kind: system
  layer: L0
  r_eff: null
  evidence:
  - id: 20260618-gate-review-external-offline-optimizer-pr-s5d-gates
    type: gate:review
    content: 'Tribunal (Opus arbiter; Codex + Gemini auditors, standard mode). Both: CONCERNS / HIGH — convergent. AGREED: H2 topology is architecturally sound and preserves control-plane≠orchestrator; the structural claim (s5d benchmark is a deterministic aggregator, not a judge) independently verified by Codex at rust/src/benchmark.rs:122 + rust/src/bin/s5d.rs:1354. CONCERNS (both): the rejection rationale OVERCLAIMS — it conflates ''naive absolute-score gate fails'' with ''automated gating impossible''; rejecting all automation on n=3 + a flawed metric is overfit. Both independently named the missing H4: pairwise A/B blinded judging + statistical delta-gating over K independent samples structurally cancels the ~20pt framing shift and the absolute-score variance. Codex: H2 is distinct from H3 only with a hard artifact-boundary contract (provenance, optimizer config, benchmark protocol, raw judge outputs, rejected-edit history, no direct mutation path) — else H2 collapses to H3-plus-tool. Both: do not rest the decision on the exact 18/20pt figures as a validated noise model (red flag, not proof); and do not strawman SkillOpt (its real gate uses rollout batches/held-out selection/rejected-edit buffers, not one scalar). ARBITER VERDICT: APPROVE WITH CONDITIONS — adopt H2 topology now; (1) narrow rationale to ''absolute single-shot LLM scoring is too noisy under current protocol'', not automation-in-principle; (2) add H4 as the future-compatible automated path; (3) bind H2''s artifact-boundary contract; (4) keep benchmark advisory. Conditions actioned: H4 added; rationale narrowed in the pending decision.'
