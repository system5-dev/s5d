problem:
  signal: SkillOpt (arXiv 2605.23904) shows validation-gated bounded-edit optimization on a skill document yields +19-24pt accuracy lift inside agent loops, including Claude Code. S5D already owns the substrate — s5d run benchmark emits a scalar rubric score (native vs skill), the evidence/gate/SHA chain governs bounded doc edits, and the autonomous-loop Mandate envelope provides the approve-once loop — but has no optimizer-edit step wiring these together.
  constraints:
  - control-plane≠orchestrator invariant (note.blueprint-projection) — optimizer/rollout loop must not live inside the skill; no weakening of evidence/gate/SHA guarantees; rubric judge variance must be measured/bounded before trusting an automated accept-reject gate; high/decision-tier skills stay human-gated (Mandate excludes them).
  targets:
  - measurable skill-quality lift via s5d run benchmark; bounded change radius per accepted edit; full provenance (SHA-bound) of every accepted skill edit; zero new inference-time cost at deployment.
  indicators: []
  goodhart_guard: null
  acceptance: 'A recorded decision on whether and how to integrate SkillOpt-style optimization that: (1) preserves control-plane≠orchestrator (optimizer loop is HOW/agent, s5d is WHAT/gate); (2) reuses s5d run benchmark as the strictly-improves gate; (3) explicitly addresses rubric-judge score variance before any automated accept/reject; (4) reuses the Mandate envelope rather than adding a parallel loop machine.'
  blast_radius: null
  reversibility: null
  status: backlog
hypotheses:
- id: skillopt-as-a-mandate-gated-flow-in-tree
  title: SkillOpt as a Mandate-gated flow (in-tree)
  content: 'Add an s5d optimizer-edit step driven by the agent inside the existing autonomous-loop Mandate envelope: agent proposes a bounded add/delete/replace edit to a SKILL.md, runs `s5d run benchmark`, and the Mandate gate admits the edit ONLY if the weighted score strictly improves over the SHA-bound baseline; rejected edits go to a buffer, accepted edits are preview/approve/import SHA-bound as gate:benchmark evidence. The optimizer loop runs in the agent/harness (HOW); s5d only adjudicates+records (WHAT), preserving control-plane≠orchestrator. Reuses benchmark scorer + Mandate + ledger; new surface = a strictly-improves benchmark gate + textual lr-budget/rejected-edit buffer as Mandate stop-conditions.'
  scope: s5d skill-evolution flow; Mandate envelope; benchmark gate
  kind: system
  layer: L0
  r_eff: null
  evidence:
  - id: 20260618-internal-skillopt-as-a-mandate-gated-flow-in-tree
    type: internal
    content: 'H1-survival probe (does median-of-K rescue the gate?). Single gemini-3-flash call producing K=10 ''independent'' grades of the same fixed rollout: within-batch weighted% mean=48.6, stdev=2.5, spread=9.5pt; bootstrap median-of-5 stdev=0.9. BUT the 10 grades share one context → anchored/auto-correlated, so the within-batch tightness is an ARTIFACT, not real robustness. Decisive cross-condition signal: the SAME rollout scored mean ~68.7% (correctness=1.0 every time) under 3 independent calls vs mean 48.6% (correctness 0.6-0.8) in the batched call — a ~20pt framing-dependent mean shift on identical input, exceeding SkillOpt''s +19pt lift. CONCLUSION: median-of-K within a single call gives false stability; the dominant, decision-relevant variance is BETWEEN independent gradings + prompt framing, which a single-call median cannot capture or fix. Properly testing median-of-K needs K INDEPENDENT calls (gemini throttled at ~3 sequential this session). Naive H1 undermined; this evidence does NOT rescue a hardened H1 — the framing-shift is a larger threat than per-grade jitter. To salvage H1 you would need: pinned judge + fixed framing + temp=0 + K independent samples, and still prove the residual band < lift.'
