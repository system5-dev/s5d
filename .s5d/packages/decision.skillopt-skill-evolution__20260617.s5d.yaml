- id: do-not-build-score-variance-defeats-the-gate
  title: Do not build — score variance defeats the gate
  content: 'Reject automated SkillOpt integration on the grounds that s5d''s benchmark score is rubric/model-judged and too noisy to back a strictly-improves accept/reject gate: SkillOpt''s reported lift relies on low-variance objective benchmarks (reasoning/code), whereas a judge-variance score will accept regressions and reject real gains, silently degrading skills under the appearance of optimization. Instead: keep skill edits human-authored, use `s5d run benchmark` only as an advisory before/after check (not an automated gate), and revisit only if/when an objective low-variance scorer exists. Weakest-link first: the gate is only as trustworthy as the score feeding it.'
  scope: score reliability; gate trustworthiness; no automation
  kind: system
  layer: L1
  r_eff: null
  evidence:
  - id: 20260618-internal-do-not-build-score-variance-defeats-the-gate
    type: internal
    content: 'Source read of rust/src/benchmark.rs: score_skill_benchmark/score_run is a deterministic pure function — it reads per-criterion scores (0.0..1.0) directly from the suite file''s run.scores and returns a weighted percent. grep for reqwest|http|judge|llm|model|stdin in benchmark.rs returns nothing: no judge, no model call, no rollout execution. `s5d run benchmark <suite>` (RunCommand::Benchmark, s5d.rs:1354) only aggregates externally-supplied judgments. CONSEQUENCE: the benchmark has zero intrinsic variance (running it N times on a fixed suite is identical); the score variance a SkillOpt strictly-improves gate depends on lives entirely in the EXTERNAL judge that fills run.scores, which s5d neither provides nor touches. The original probe design ("run s5d benchmark N times, measure spread") was based on a wrong model and is void. The real probe is: pick a judge (LLM grader), score the SAME rollout N times, measure spread of run.scores — a HOW-side experiment outside s5d.'
    verdict: refine
    valid_until: 2026-09-16T08:14:21.055793+00:00
    carrier_ref: null
    formality: 4
    claim_scope:
