- id: quarantined-optimizer-pairwise-statistical-gate-human-merge
  title: Quarantined optimizer, pairwise/statistical gate, human merge
  content: 'Automated gating IS feasible if the gate is redesigned to defeat the measured failure modes (raised by both tribunal auditors). Replace absolute single-shot LLM scoring with: (a) PAIRWISE A/B blinded judging — judge compares baseline output vs candidate side-by-side with randomized order, returns which strictly improves on the rubric (structurally cancels the ~20pt absolute-framing shift); or (b) STATISTICAL delta gating — accept only if candidate mean exceeds baseline by Z·stdev over K INDEPENDENT judge calls (not one batched/anchored call), with a noise-band/effect-size threshold; plus objective deterministic checks (compile/test/lint) where the skill governs code. Preregistered protocol, raw judge outputs retained, regression/canary sets, and a human still merges the skill text. The optimizer loop stays OUTSIDE s5d (quarantined); s5d validates/imports artifacts and humans accept — never runs or steers the loop. Not buildable now (needs the protocol + an objective/pairwise harness s5d lacks), but the correct future path. Supersedes the weaker "no automation until an objective scorer exists" framing: the blocker is absolute-score variance, not automation in principle.'
  scope: future automated gate; pairwise/statistical judging; quarantined optimizer
  kind: system
  layer: L0
  r_eff: null
  evidence:
  - id: 20260618-external-quarantined-optimizer-pairwise-statistical-gate-human-merge
    type: external
    content: 'Both tribunal auditors (Codex + Gemini), independently, asserted that the measured failure modes are specific to ABSOLUTE single-shot scoring and are addressable: (a) pairwise A/B blinded judging (baseline vs candidate side-by-side, randomized order) structurally cancels the ~20pt absolute-framing mean shift, since both sides share the same frame; (b) statistical delta-gating — accept only if candidate beats baseline by Z·stdev over K INDEPENDENT judge calls — converts per-grade noise into a powered hypothesis test rather than a single-threshold coin-flip; (c) objective deterministic checks (compile/test/lint) gate code-governing skills with zero judge noise. Gemini noted pairwise A/B as a ''well-documented'' mitigation for LLM-judge context-anchoring. STATUS: design-direction only — UNTESTED in this repo; s5d has no pairwise/statistical/objective harness, and the residual-noise-below-effect-size claim is unproven. Treated as a deferred hypothesis (next_move=defer), not a validated path; it is the door left open, not a build commitment.'
    verdict: refine
