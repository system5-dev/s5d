    agent: claude-opus-session
  - id: 20260618-internal-do-not-build-score-variance-defeats-the-gate
    type: internal
    content: 'Judge-variance probe: one fixed (task, answer) rollout graded 3× with an identical prompt by gemini-3-flash against the real suite rubric (correctness w4 / scope w2 / evidence w3 / tests w1). Results: weighted% = 75.0 / 74.0 / 57.0 → spread 18.0pt, stdev 8.3pt. correctness stable at 1.0; scope (0.5/0.5/0.0), evidence (0.8/0.8/0.5), tests (0.1/0.0/0.2) all flip on identical input. The 18pt noise band ≈ SkillOpt''s entire reported lift (+19pt), so a naive strictly-improves gate on this score is noise-dominated: it would accept regressions and reject real gains. Confirms H3''s premise for the naive gate. LIMITATIONS: N=3 only (the 8-call loop hung at call 3 twice — gemini stdin-hang / throttle), single judge, single rollout, no temperature=0 / median-of-K ensemble / stronger-judge comparison. Does NOT rule out a hardened judging protocol (lower temp, median-of-K, more objective criteria) shrinking the band below the lift — that is the H1-survival probe.'
