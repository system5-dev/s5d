problem:
  signal: |
    Code review is structurally absent from the S5D evidence chain. `s5d approve --reviewer` records a name and timestamp,
    not a verdict, scope, or findings. For decision/high-tier specs, an auditor cannot distinguish "reviewer read the diff carefully"
    from "reviewer rubber-stamped". External reviewers (tribunal, reviewer agent, human) currently have no first-class home for their output.
  constraints:
  - Schema change must be additive (one new enum value), no breaking change to existing specs.
  - No new CLI surface — must reuse `s5d_add_evidence`.
  - No coupling to specific external reviewer skills (tribunal/reviewer/human all interchangeable).
  - Gate rule must be tier-aware (decision/high require review; lightweight does not).
  targets:
  - Auditability — review verdict + scope + reviewer captured structurally.
  - Thinness — S5D remains a recording layer, not an orchestrator.
  indicators:
  - Adoption per spec (count of review-evidence per decision-tier spec).
  - Verdict distribution (pass vs fail vs refine) — observed, not optimized (Anti-Goodhart).
  - Reviewer kind distribution (human vs agent) — observed.
  acceptance: |
    A decision-tier spec cannot pass `s5d_import` unless ≥1 evidence record of type `gate:review` with verdict=pass exists,
    referencing a named reviewer. The evidence schema reuses formality (1–5), claim_scope (set), reliability (0..1).
    `s5d_add_evidence` accepts the new type without a new flag. Existing approved specs remain importable (grandfathered or migrated explicitly).
  blast_radius: metamodel + run-gates rule + docs (session-protocol.md, SKILL.md command table). No CLI surface change.
  reversibility: high — evidence type is additive; gate rule can be reverted without data loss.
  status: framed
