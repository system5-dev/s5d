context: |
  ## Problem
  S5D now validates architecture, installs Rust-backed hooks, and updates its own skill/binary, but the S5D repository itself was not yet governed by an S5D feature spec.

  ## Goal
  Make the Rust implementation of S5D explicitly owned by S5D artifacts, and make architecture drift visible through the architecture gate and codebase coverage.

  ## Privacy
  Classification: Internal
workflow:
  mode: implement
  target_architecture:
    summary: "S5D dogfoods S5D: every Rust source file is owned by a component, architecture-gated specs declare cross-domain dependencies, and codebase coverage records the governed module state."
    invariants:
    - Every Rust source file under rust/src and rust/tests is owned by exactly one component path.
    - Cross-domain source imports are allowed only when represented by links.edges.
    - The Rust module is not allowed to remain blind in .s5d/codebase/coverage.yaml.
    - Git hooks and update checks stay implemented in Rust, not shell hook logic.
  delivery_strategy:
    summary: Introduce a canonical self-governance spec first, then keep codebase coverage synchronized from that spec.
    rationale: This promotes the existing generated codebase snapshot into an auditable S5D artifact instead of committing stale local output.
  resources: null
  role_map:
    owner: human
    implementer: coder
    reviewer: reviewer
    verifier: reviewer
  review_policy:
    cross_model_required: false
    required_on:
    - architecture_gate_changes
  execution_mode:
    engine: manual
    max_iterations: null
    stop_conditions:
    - Architecture gate passes
    - Codebase coverage reports rust as governed
    - New architectural dependency requires explicit edge review
  phases:
  - id: model
    title: Model
    scope: Declare S5D's Rust domains, capabilities, components, and dependency edges.
    roles:
    - owner
    - implementer
    acceptance:
    - Self-governance spec validates and graph-checks.
    - Component paths cover Rust source files without overlap.
    rollback:
    - Remove the self-governance spec and regenerate index/coverage.
  - id: enforce
    title: Enforce
    scope: Run the architecture gate and codebase coverage check against the declared model.
    roles:
    - implementer
    - verifier
    acceptance:
    - s5d check passes for this spec.
    - s5d codebase check passes after sync.
    rollback:
    - Revert coverage artifacts if the model proves inaccurate.
