problem:
  signal: S5D covers decision/feature/trace but has no protocol for session-level human-AI collaboration (WAL, IPC, REVIEW markers). Users invent these ad-hoc.
  constraints:
  - Must not break existing S5D lifecycle (decision + feature + trace)
  - Must be decomposable if scope too large
  - Tests must include both A/B and replay types
  targets:
  - Coverage of all 6 Red Book concepts
  - Coherence with existing S5D skills
  - Testability via concrete metrics
  indicators:
  - Adoption friction
  - Token cost of protocol
  acceptance: "All 6 Red Book concepts integrated; effectiveness metrics defined with measurement protocol; both A/B and replay test protocols specified"
  blast_radius: skills/ directory only (no Rust changes)
  reversibility: high (skill files are additive, easily removed)
  status: in_progress
hypotheses:
- id: h1-new-skill-layer-s5d-session
  title: 'H1: New skill layer — s5d-session'
  content: 'Add a single new skill `s5d-session` covering all Red Book concepts: WAL protocol, IPC addressability (spec:// URI), atomicity rules, conflict resolution (human > spec > code), REVIEW markers, boot sequence, session lifecycle, effectiveness metrics. Pure SKILL.md — no Rust changes. The skill defines conventions and PRESENT blocks. Existing skills reference it for session context. Tests defined as skill-level acceptance scenarios.'
  scope: skills/ directory only
  kind: system
  layer: L1
  r_eff: null
  evidence:
