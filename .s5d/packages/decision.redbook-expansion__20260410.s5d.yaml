    type: prediction
    content: 'Must observe: single SKILL.md covers all 6 concepts coherently; users invoke /s5d-session for operational protocol. Must NOT observe: concept fragmentation across files; need to read multiple skills to understand session protocol; SKILL.md exceeding 600 lines (sign of overload).'
