- id: h3-decomposed-sub-skills-with-shared-protocol
  title: 'H3: Decomposed sub-skills with shared protocol'
  content: 'Decompose Red Book concepts into 3 focused sub-skills: (1) s5d-wal — WAL protocol, session lifecycle, boot sequence; (2) s5d-ipc — addressability (spec:// URI), atomicity, conflict resolution, REVIEW markers; (3) s5d-metrics — effectiveness metrics, A/B test protocol, replay test protocol. Each is standalone, each has own SKILL.md. Umbrella s5d.md gets a brief reference section pointing to sub-skills. No Rust changes. Tests live in s5d-metrics as formal test protocols.'
  scope: skills/ directory — 3 new sub-skills + umbrella update
