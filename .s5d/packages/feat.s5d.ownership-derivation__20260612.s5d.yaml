context: |
  ## Problem
  RAN-491: owning_package on global aliases decides what rollback tombstones,
  but it sits outside compute_state_fingerprint — corrupting it is invisible to
  drift-check (pinned by test owning_package_corruption_is_invisible_to_drift_check).
  Rollback logic is also duplicated between CLI (bin/s5d.rs run_rollback) and
  MCP (mcp.rs tool_s5d_rollback), so any fix would have to land twice.

  ## Goal
  Implement decision.s5d.ownership-derivation winner (derive-ownership-from-ledger):
  rollback derives the owner of each global alias from the append-only ledger plus
  stored packages at the point of use. Stored owning_package degrades to a verified
  cache. Conservative semantics — derivation confirms or vetoes tombstoning, never
  expands it; disagreement is a loud warning; underivable falls back to stored field.
  Extract one shared lib rollback function used by both CLI and MCP.

  ## Acceptance (GWT)
  1. Given a global alias whose owning_package was tampered to claim spec A while
     the ledger derivation attributes it to spec B, when A is rolled back, then the
     alias is NOT tombstoned and a warning names both owners.
  2. Given untampered aliases where derivation agrees with the stored field, when
     the owning spec is rolled back, then tombstoning proceeds exactly as before
     (regression-safe).
  3. Given a legacy global alias with no ledger trace (underivable), when its stored
     owner is rolled back, then tombstoning proceeds via stored-field fallback with
     a warning, not a hard failure.
  4. Given a global whose derivation attributes it to spec A but stored field names
     another spec, when A is rolled back, then rollback reports the suspected tamper
     loudly and takes no destructive action on that alias.

  ## DO / DON'T
  DO: extract shared rollback into the library; keep referenced_globals guard; keep
  ledger/record/index updates byte-compatible; add corruption + fallback tests.
  DON'T: change compute_state_fingerprint; add new persistent artifacts; make
  rollback fail hard on legacy repos; let derivation tombstone anything the stored
  field does not claim.

  ## Privacy
  Classification: Internal
workflow:
  mode: plan
  target_architecture:
    summary: Single shared rollback function in the library (import module) with
      ledger-derived ownership cross-check; CLI and MCP are thin callers. The
      mutable owning_package field is a verified cache, never the sole authority
      for destructive actions.
    invariants:
    - Derivation never expands tombstoning beyond what the stored field claims
    - Fingerprint formula unchanged — no baseline invalidation
    - Underivable ownership degrades to stored-field trust with a warning
  delivery_strategy:
    summary: Extract run_rollback/tool_s5d_rollback bodies into one lib fn, add
      derive_global_owners over ledger+packages, wire the cross-check, then cover
      with corruption/fallback/regression tests in standalone_repos.rs.
    rationale: Extraction first — implementing the cross-check twice would recreate
      the duplication that made this class of fix expensive.
