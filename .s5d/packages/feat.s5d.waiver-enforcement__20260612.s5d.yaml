context: '## Problem

  Docs promise "High | No waivers allowed" and "assurance gates never waivable", but
  s5d_waiver only checks gate existence and import accepts any non-expired waived
  status — high-tier schema/graph/review are bypassable via MCP (external audit, CRITICAL).


  ## Goal

  Enforce the written contract in code at BOTH boundaries: waiver creation refuses
  high-tier specs and assurance kinds; import refuses records carrying contract-forbidden
  waivers (defense against pre-existing/tampered records). Single shared predicate
  so docs, creation, and import cannot drift.


  ## Privacy

  Classification: Internal

  '
workflow:
  mode: plan
  target_architecture:
    summary: 'gates::waiver_forbidden_reason(tier, kind) is the single source of truth:
      high tier → no waivers of any kind; assurance kinds (schema, graph, review,
      architecture, contract, privacy) → never waivable on any tier. tool_s5d_waiver
      consults it before writing; both import paths consult it before accepting a
      waived gate result. Docs aligned to the same canonical set.'
    invariants:
    - A waived assurance gate can neither be created nor imported
    - High-tier records with any waiver are rejected at import
    - Command gates (test/lint/timeout) on non-high tiers remain waivable
  delivery_strategy:
