<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__TITLE__ — Domain Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:            #07090f;
  --bg2:           #0d1117;
  --surface:       #111827;
  --surface2:      #1a2235;
  --surface3:      #212d42;
  --border:        rgba(255,255,255,0.07);
  --border-bright: rgba(255,255,255,0.13);
  --text:          #f0f4ff;
  --text-2:        #8b99b5;
  --text-3:        #4e5d78;
  --core:          #4f8ef7;
  --core-soft:     rgba(79,142,247,0.12);
  --core-glow:     rgba(79,142,247,0.35);
  --supporting:    #f5a623;
  --supporting-soft: rgba(245,166,35,0.1);
  --supporting-glow: rgba(245,166,35,0.35);
  --generic:       #5e7599;
  --generic-soft:  rgba(94,117,153,0.1);
  --generic-glow:  rgba(94,117,153,0.25);
  --accent:        #818cf8;
  --accent-soft:   rgba(129,140,248,0.15);
  --radius:        14px;
  --radius-sm:     8px;
  --font:          'Inter', -apple-system, sans-serif;
  --mono:          'JetBrains Mono', monospace;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Noise texture overlay ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* ── Header ── */
.header {
  position: sticky;
  top: 0;
  z-index: 200;
  background: rgba(7,9,15,0.85);
  backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
}
.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 1.5rem;
  height: 64px;
}
.logo-mark {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--core) 0%, var(--accent) 100%);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800; color: #fff;
  flex-shrink: 0;
  box-shadow: 0 0 16px var(--core-glow);
}
.header-title {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--text);
}
.header-sub {
  font-size: 12px;
  color: var(--text-3);
  font-family: var(--mono);
  margin-top: 1px;
}
.header-right { margin-left: auto; display: flex; align-items: center; gap: 0.75rem; }

/* ── Stats ── */
.stats { display: flex; gap: 0.5rem; }
.stat {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 11.5px;
  font-weight: 500;
  color: var(--text-2);
  white-space: nowrap;
}
.stat-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.stat-dot-core { background: var(--core); box-shadow: 0 0 6px var(--core-glow); }
.stat-dot-supporting { background: var(--supporting); box-shadow: 0 0 6px var(--supporting-glow); }
.stat-dot-generic { background: var(--generic); }
.stat-dot-neutral { background: var(--text-3); }
.stat-num { font-weight: 700; color: var(--text); }

/* ── Controls bar ── */
.controls {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 10px 2rem;
}
.controls-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
  max-width: 340px;
}
.search-icon {
  position: absolute;
  left: 11px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-3);
  font-size: 14px;
  pointer-events: none;
}
.search-box {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border-bright);
  border-radius: var(--radius-sm);
  padding: 7px 12px 7px 32px;
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-box:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.search-box::placeholder { color: var(--text-3); }

.filter-group { display: flex; gap: 4px; }
.filter-btn {
  background: transparent;
  border: 1px solid var(--border-bright);
  border-radius: var(--radius-sm);
  padding: 6px 14px;
  color: var(--text-2);
  font-family: var(--font);
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.filter-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border-bright); }
.filter-btn.active-all    { background: var(--accent-soft); border-color: var(--accent); color: #c7d2fe; }
.filter-btn.active-core   { background: var(--core-soft); border-color: var(--core); color: #93c5fd; }
.filter-btn.active-supporting { background: var(--supporting-soft); border-color: var(--supporting); color: #fcd34d; }
.filter-btn.active-generic { background: var(--generic-soft); border-color: var(--generic); color: #94a3b8; }

.diagram-toggle {
  margin-left: auto;
  background: transparent;
  border: 1px solid var(--border-bright);
  border-radius: var(--radius-sm);
  padding: 6px 14px;
  color: var(--text-3);
  font-family: var(--font);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 5px;
}
.diagram-toggle:hover { background: var(--surface); color: var(--text-2); }

/* ── Page layout ── */
.page {
  max-width: 1400px;
  margin: 0 auto;
  padding: 2rem;
}

/* ── Diagram ── */
.diagram-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 2rem;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  position: relative;
  overflow: hidden;
}
.diagram-wrap::before {
  content: 'DOMAIN GRAPH';
  position: absolute;
  top: 0.875rem; left: 1.25rem;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.12em;
  color: var(--text-3);
  z-index: 10;
  pointer-events: none;
}
.diagram-wrap.collapsed { display: none; }

#graph-svg {
  display: block;
  width: 100%;
  height: 500px;
  cursor: grab;
}
#graph-svg:active { cursor: grabbing; }

.node circle { transition: fill-opacity 0.2s, stroke-opacity 0.2s; }
.node:hover circle:first-of-type { stroke-width: 2.5px; }

.graph-tooltip {
  position: fixed;
  background: var(--surface2);
  border: 1px solid var(--border-bright);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-size: 12px;
  color: var(--text);
  pointer-events: none;
  z-index: 1000;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  display: none;
}
.graph-tooltip .tt-cls {
  color: var(--text-3);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 2px;
  display: block;
}

/* ── Section header ── */
.section-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 1rem;
}
.section-label-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.pill-core    { background: var(--core-soft);       border: 1px solid rgba(79,142,247,0.3); color: #93c5fd; }
.pill-supporting { background: var(--supporting-soft); border: 1px solid rgba(245,166,35,0.3); color: #fcd34d; }
.pill-generic { background: var(--generic-soft);    border: 1px solid rgba(94,117,153,0.3); color: #94a3b8; }
.section-count { font-size: 12px; color: var(--text-3); font-family: var(--mono); }

.domains-block { margin-bottom: 2.5rem; }

/* ── Card grid ── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
  gap: 14px;
}

/* ── Card ── */
.card {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  cursor: pointer;
  transition:
    transform 0.2s cubic-bezier(0.34,1.56,0.64,1),
    box-shadow 0.2s ease,
    border-color 0.15s,
    opacity 0.2s;
  overflow: hidden;
}

/* Gradient accent bar top */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  opacity: 0;
  transition: opacity 0.2s;
}
.card-core::before    { background: linear-gradient(90deg, var(--core), #818cf8); }
.card-supporting::before { background: linear-gradient(90deg, var(--supporting), #fb923c); }
.card-generic::before { background: linear-gradient(90deg, var(--generic), #64748b); }

/* Glow blob */
.card::after {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 120px; height: 120px;
  border-radius: 50%;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.card-core::after    { background: radial-gradient(circle, var(--core-glow), transparent 70%); }
.card-supporting::after { background: radial-gradient(circle, var(--supporting-glow), transparent 70%); }
.card-generic::after { background: radial-gradient(circle, var(--generic-glow), transparent 70%); }

.card:hover {
  transform: translateY(-3px) scale(1.005);
  box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.3);
}
.card:hover::before { opacity: 1; }
.card:hover::after  { opacity: 1; }

.card.card-core:hover   { border-color: rgba(79,142,247,0.4); }
.card.card-supporting:hover { border-color: rgba(245,166,35,0.4); }
.card.card-generic:hover { border-color: rgba(94,117,153,0.35); }

.card.selected {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-soft), 0 12px 40px rgba(0,0,0,0.5);
}
.card.selected::before { opacity: 1; }
.card.related { border-color: var(--border-bright); }
.card.hidden  { display: none; }
.card.dimmed  { opacity: 0.3; transform: none; }

/* ── Card internals ── */
.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 0.75rem;
  position: relative;
  z-index: 1;
}
.card-name {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--text);
  line-height: 1.3;
}
.card-id {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-3);
  margin-top: 2px;
}

.badge {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 6px;
  white-space: nowrap;
  margin-left: 0.5rem;
  flex-shrink: 0;
}
.badge-core       { background: var(--core-soft);       color: #93c5fd; border: 1px solid rgba(79,142,247,0.3); }
.badge-supporting { background: var(--supporting-soft); color: #fcd34d; border: 1px solid rgba(245,166,35,0.3); }
.badge-generic    { background: var(--generic-soft);    color: #94a3b8; border: 1px solid rgba(94,117,153,0.25); }

.card-desc {
  font-size: 12.5px;
  color: var(--text-2);
  line-height: 1.55;
  margin-bottom: 0.85rem;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  position: relative;
  z-index: 1;
}

.card-section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-top: 0.75rem;
  margin-bottom: 0.4rem;
  position: relative;
  z-index: 1;
}

.cap-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 2px;
  position: relative;
  z-index: 1;
}
.cap-item {
  display: flex;
  align-items: baseline;
  gap: 6px;
  padding: 4px 6px;
  border-radius: 5px;
  transition: background 0.1s;
}
.cap-item:hover { background: var(--surface2); }
.cap-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  flex-shrink: 0;
  font-family: var(--mono);
}
.cap-desc {
  font-size: 11px;
  color: var(--text-3);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
}

.ent-list {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  position: relative;
  z-index: 1;
}
.ent-tag {
  font-size: 11px;
  font-weight: 500;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  color: var(--text-2);
  border-radius: 5px;
  padding: 2px 8px;
  font-family: var(--mono);
  transition: all 0.12s;
}
.ent-tag:hover {
  background: var(--surface3);
  color: var(--text);
  border-color: var(--border-bright);
}

/* ── Relations panel ── */
.relations-strip {
  margin-top: 0.75rem;
  padding-top: 0.65rem;
  border-top: 1px solid var(--border);
  display: none;
  flex-direction: column;
  gap: 4px;
  position: relative;
  z-index: 1;
}
.relations-strip.visible { display: flex; }
.rel-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11.5px;
}
.rel-arrow { color: var(--text-3); font-family: var(--mono); font-size: 12px; }
.rel-domain { color: var(--text); font-weight: 600; }
.rel-arch {
  font-size: 10px;
  background: var(--surface3);
  color: var(--text-3);
  padding: 1px 6px;
  border-radius: 4px;
  font-family: var(--mono);
}

/* ── Empty state ── */
.empty {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--text-3);
  font-size: 14px;
}
.empty-icon { font-size: 2rem; margin-bottom: 0.5rem; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-3); }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo-mark">S5</div>
    <div>
      <div class="header-title">__TITLE__</div>
      <div class="header-sub">Domain Map · __DATE__ · __PRODUCT__</div>
    </div>
    <div class="header-right">
      <div class="stats">
        <div class="stat"><span class="stat-dot stat-dot-core"></span><span class="stat-num">__CORE_COUNT__</span> core</div>
        <div class="stat"><span class="stat-dot stat-dot-supporting"></span><span class="stat-num">__SUPPORTING_COUNT__</span> supporting</div>
        <div class="stat"><span class="stat-dot stat-dot-generic"></span><span class="stat-num">__GENERIC_COUNT__</span> generic</div>
        <div class="stat"><span class="stat-dot stat-dot-neutral"></span><span class="stat-num">__CAP_COUNT__</span> capabilities</div>
        <div class="stat"><span class="stat-dot stat-dot-neutral"></span><span class="stat-num">__ENT_COUNT__</span> entities</div>
      </div>
    </div>
  </div>
</header>

<div class="controls">
  <div class="controls-inner">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search-box" id="search" type="text"
             placeholder="Search domains, capabilities, entities…"
             oninput="handleSearch(this.value)">
    </div>
    <div class="filter-group">
      <button class="filter-btn active-all" id="btn-all"        onclick="setFilter('all')">All</button>
      <button class="filter-btn"            id="btn-core"       onclick="setFilter('core')">Core</button>
      <button class="filter-btn"            id="btn-supporting" onclick="setFilter('supporting')">Supporting</button>
      <button class="filter-btn"            id="btn-generic"    onclick="setFilter('generic')">Generic</button>
    </div>
    <button class="diagram-toggle" id="diag-toggle" onclick="toggleDiagram()">
      <span id="diag-toggle-icon">↑</span> Diagram
    </button>
  </div>
</div>

<div class="page">

  <div class="diagram-wrap" id="diagram">
    <svg id="graph-svg"></svg>
  </div>

  <div id="cards-root">
__CARDS__
  </div>

  <div class="empty" id="empty-state" style="display:none">
    <div class="empty-icon">◎</div>
    No domains match your search.
  </div>

</div>

<script>
const GRAPH_NODES  = __GRAPH_NODES_JSON__;
const EDGES        = __EDGES_JSON__;
const DOMAIN_NAMES = __DOMAIN_NAMES_JSON__;

const CLS_COLOR = { core: '#4f8ef7', supporting: '#f5a623', generic: '#5e7599' };
const CLS_FILL  = { core: 'rgba(79,142,247,0.13)', supporting: 'rgba(245,166,35,0.11)', generic: 'rgba(94,117,153,0.09)' };
const R = 38;

let currentFilter = 'all';
let currentSearch = '';
let selectedId    = null;

/* ── Filters & search ── */
function setFilter(cls) {
  currentFilter = cls;
  ['all','core','supporting','generic'].forEach(c => {
    const btn = document.getElementById('btn-' + c);
    btn.className = 'filter-btn' + (c === cls ? ' active-' + c : '');
  });
  applyFilters();
}
function handleSearch(val) { currentSearch = val.toLowerCase().trim(); applyFilters(); }
function applyFilters() {
  const cards = document.querySelectorAll('.card');
  let visible = 0;
  cards.forEach(card => {
    const ok = (currentFilter === 'all' || card.dataset.cls === currentFilter) &&
               (!currentSearch || card.dataset.search.includes(currentSearch));
    card.classList.toggle('hidden', !ok);
    if (!ok) card.classList.remove('selected','dimmed','related');
    if (ok) visible++;
  });
  document.getElementById('empty-state').style.display = visible === 0 ? 'block' : 'none';
}

/* ── Card selection ── */
function selectCard(id) {
  const cards = document.querySelectorAll('.card');
  if (selectedId === id) {
    selectedId = null;
    cards.forEach(c => c.classList.remove('selected','dimmed','related'));
    document.querySelectorAll('.relations-strip').forEach(r => { r.classList.remove('visible'); r.innerHTML = ''; });
    if (window._graphHighlight) window._graphHighlight(null);
    return;
  }
  selectedId = id;
  const relOut = EDGES.filter(e => e.from === id).map(e => ({id: e.to,   dir:'out', arch:e.arch}));
  const relIn  = EDGES.filter(e => e.to   === id).map(e => ({id: e.from, dir:'in',  arch:e.arch}));
  const relIds = new Set([...relOut, ...relIn].map(r => r.id));
  cards.forEach(card => {
    card.classList.remove('selected','dimmed','related');
    const strip = card.querySelector('.relations-strip');
    if (strip) { strip.classList.remove('visible'); strip.innerHTML = ''; }
    if (card.dataset.id === id) {
      card.classList.add('selected');
      const all = [...relOut, ...relIn];
      all.forEach(r => {
        const arrow = r.dir === 'out' ? '→' : '←';
        strip.innerHTML += `<div class="rel-item"><span class="rel-arrow">${arrow}</span><span class="rel-domain">${DOMAIN_NAMES[r.id]||r.id}</span><span class="rel-arch">${r.arch}</span></div>`;
      });
      if (all.length) strip.classList.add('visible');
    } else if (relIds.has(card.dataset.id)) {
      card.classList.add('related');
    } else {
      card.classList.add('dimmed');
    }
  });
  if (window._graphHighlight) window._graphHighlight(id, relIds);
}

/* ── Diagram toggle ── */
function toggleDiagram() {
  const diag = document.getElementById('diagram');
  const icon = document.getElementById('diag-toggle-icon');
  diag.classList.toggle('collapsed');
  icon.textContent = diag.classList.contains('collapsed') ? '↓' : '↑';
}

/* ── D3 force graph ── */
(function initGraph() {
  const svgEl  = document.getElementById('graph-svg');
  const wrap   = document.getElementById('diagram');
  const W = wrap.clientWidth || 900;
  const H = 500;

  const svg = d3.select(svgEl)
    .attr('viewBox', `0 0 ${W} ${H}`)
    .attr('preserveAspectRatio', 'xMidYMid meet');

  // Arrow markers
  const defs = svg.append('defs');
  Object.entries(CLS_COLOR).forEach(([cls, color]) => {
    defs.append('marker')
      .attr('id', `arr-${cls}`)
      .attr('viewBox', '0 -5 10 10').attr('refX', R + 12).attr('refY', 0)
      .attr('markerWidth', 5).attr('markerHeight', 5).attr('orient', 'auto')
      .append('path').attr('d', 'M0,-5L10,0L0,5')
      .attr('fill', color).attr('opacity', 0.55);
  });

  // Zoom/pan layer
  const g = svg.append('g');
  svg.call(d3.zoom().scaleExtent([0.15, 5]).on('zoom', e => g.attr('transform', e.transform)));

  const nodes = GRAPH_NODES.map(d => ({...d}));
  const links = EDGES.map(e => ({source: e.from, target: e.to, arch: e.arch, desc: e.desc}));

  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(190).strength(0.45))
    .force('charge', d3.forceManyBody().strength(-520))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('x', d3.forceX(W / 2).strength(0.04))
    .force('y', d3.forceY(H / 2).strength(0.04))
    .force('collision', d3.forceCollide(R + 18));

  /* Links */
  const linkSel = g.append('g').selectAll('line').data(links).join('line')
    .attr('stroke-width', 1.5).attr('stroke-opacity', 0.35);

  function linkColor(d) {
    const t = typeof d.target === 'object' ? d.target : nodes.find(n => n.id === d.target);
    return CLS_COLOR[t?.cls] || CLS_COLOR.generic;
  }
  function markerFor(d) {
    const t = typeof d.target === 'object' ? d.target : nodes.find(n => n.id === d.target);
    return `url(#arr-${t?.cls || 'generic'})`;
  }

  /* Tooltip */
  const tooltip = d3.select('body').append('div').attr('class', 'graph-tooltip');

  /* Nodes */
  const nodeSel = g.append('g').selectAll('g').data(nodes).join('g')
    .attr('class', 'node')
    .attr('cursor', 'pointer')
    .on('click', (_, d) => {
      selectCard(d.id);
      const card = document.querySelector(`.card[data-id="${d.id}"]`);
      if (card) card.scrollIntoView({behavior:'smooth', block:'center'});
    })
    .on('mouseover', (e, d) => {
      tooltip.style('display','block')
        .html(`<strong>${d.name}</strong><span class="tt-cls">${d.cls}</span>`);
    })
    .on('mousemove', e => tooltip.style('left', (e.pageX+14)+'px').style('top', (e.pageY-8)+'px'))
    .on('mouseout',  () => tooltip.style('display','none'))
    .call(d3.drag()
      .on('start', (e,d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag',  (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on('end',   (e,d) => { if (!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
    );

  /* Node circle */
  nodeSel.append('circle')
    .attr('r', R)
    .attr('fill', d => CLS_FILL[d.cls] || CLS_FILL.generic)
    .attr('stroke', d => CLS_COLOR[d.cls] || CLS_COLOR.generic)
    .attr('stroke-width', 1.5);

  /* Classification pip */
  nodeSel.append('circle')
    .attr('r', 5).attr('cx', R * 0.66).attr('cy', -R * 0.66)
    .attr('fill', d => CLS_COLOR[d.cls] || CLS_COLOR.generic)
    .attr('pointer-events', 'none');

  /* Name label — wrap into up to 2 lines */
  nodeSel.each(function(d) {
    const words = d.name.split(' ');
    const el = d3.select(this).append('text')
      .attr('text-anchor', 'middle').attr('pointer-events', 'none')
      .attr('fill', '#e2e8f0').attr('font-family', "'Inter', sans-serif")
      .attr('font-size', '11px').attr('font-weight', '600');
    if (words.length === 1) {
      el.append('tspan').attr('x', 0).attr('dy', '0.35em').text(d.name);
    } else {
      const mid = Math.ceil(words.length / 2);
      el.append('tspan').attr('x', 0).attr('dy', '-0.4em').text(words.slice(0,mid).join(' '));
      el.append('tspan').attr('x', 0).attr('dy', '1.25em').text(words.slice(mid).join(' '));
    }
  });

  /* Tick */
  sim.on('tick', () => {
    linkSel
      .attr('stroke', linkColor)
      .attr('marker-end', markerFor)
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  /* Graph highlight (called from selectCard) */
  window._graphHighlight = function(domainId, relIds) {
    if (!domainId) {
      nodeSel.select('circle').attr('fill-opacity', 1).attr('stroke-opacity', 1);
      linkSel.attr('stroke-opacity', 0.35);
      return;
    }
    nodeSel.select('circle')
      .attr('fill-opacity', d => d.id === domainId || relIds.has(d.id) ? 1 : 0.2)
      .attr('stroke-opacity', d => d.id === domainId || relIds.has(d.id) ? 1 : 0.15);
    linkSel.attr('stroke-opacity', d => {
      const s = typeof d.source === 'object' ? d.source.id : d.source;
      const t = typeof d.target === 'object' ? d.target.id : d.target;
      return (s === domainId || t === domainId) ? 0.85 : 0.06;
    });
  };
})();
</script>
</body>
</html>
