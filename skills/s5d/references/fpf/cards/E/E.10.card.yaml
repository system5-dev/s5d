summary: "Status & placement. Part E.10 (“Lexical Discipline & Stratification”); complements E.10.D1 (D.CTX), E.10.D2 (I/D/S), and the DesignRunTag / CtxState boundary discipline (A.15; E.18), and is referenced by F‑cluster naming practices (F.4–F.8). This bundle consolidates all lexical constraints in one place so authors can cite “LEX‑BUNDLE” instead of listing rules scattered across documents."
