summary: "Establish a single, human‑centric Working‑Model that practitioners can read, discuss, and evolve without exposure to formal machinery. Each statement declares a justification stance (validationMode) and, when assurance is sought, attaches appropriate grounding via one or more assurance shoulders — Mapping, Logical, Constructive — and may additionally attach Empirical Validation (evidence) as defined by the Trust & Assurance calculus. Empirical Validation can accompany any stance; it is required when the stance is postulate. Assurance shoulders sit beneath the Working‑Model and never define its vocabulary. Put bluntly: one model people work in; three assurance shoulders — plus empirical checks when the world is the judge."
