summary: "> Tech‑name: U.MultiViewPublicationKit (MVPK) > Plain‑name: Multi‑view publication kit (for morphisms) > Signature (conceptual form): MVPK : (U.Morphism, Σ_viewpoints) ↦ U.ViewFamily with per‑viewpoint components > ViewObj_s : U.Object → U.ViewObj_s and Emit_s(-) : U.Morphism → U.ViewMorph_s, > such that (ViewObj_s, Emit_s) forms a functor U → View_s(U). For each s ⪯ t, a reindexing coercion > PromoteView[s→t]_X : ViewObj_s(X) → ViewObj_t(X) exists and is natural in X: for every f : X → Y, > PromoteView[s→t]_Y ∘ Emit_s(f) = Emit_t(f) ∘ PromoteView[s→t]_X (see Laws §6.2). > Notation: Σ_viewpoints is abbreviated as Σ where convenient. > Twin‑register aliases (naming discipline): > • Tech: Emit_PlainView, Emit_TechCard, Emit_InteropCard, Emit_AssuranceLane; PromoteView[s→t]_-. > • Plain: Plai"
