summary: "Purpose. Give FPF a lawful, minimal, and portable way to speak about “the problem we face” so that the selector (G.5) can legally admit/abstain without prose or guesswork. We do this by (i) typing problems with CHR‑grounded traits and (ii) attaching them to a TaskSignature (S2) record that downstream patterns can consume. The Standard is Context‑local, evidence‑anchored, tri‑state‑aware, and bridge‑savvy. TaskSignature is minimal but sufficient for eligibility, acceptance, and policy‑governed choice."
