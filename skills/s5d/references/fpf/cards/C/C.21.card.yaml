summary: "> Purpose. Give FPF a typed, auditable way to speak about the health, maturity, and structure of a scientific/engineering discipline, without collapsing into taste, anecdotes, or single-number scores. The pattern defines a portable set of Characteristics and guards (legality, freshness, scope) that any Context can specialize."
