summary: "> One‑line summary. > CT2R‑LOG treats the everyday Working‑Model relations— ut:ComponentOf, ut:MemberOf, ut:PortionOf, ut:AspectOf —as the publication surface for structure, while binding each published edge to a grounding trace and a declared tv:validationMode. Authors keep using a short list of relations; reviewers get reconstructible provenance."
