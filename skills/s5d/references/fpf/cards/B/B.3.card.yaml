summary: "> Plain‑English headline. > B.3 defines how assurance (trust) is computed and propagated for both physical systems and knowledge artifacts, using a small typed assurance tuple (F–G–R: F/R characteristics plus G as scope object) and conservative aggregation rules that respect the Γ‑invariants and A.15 Strict Distinction. It treats the Working‑Model layer as the publication surface for claims, with assurance attached downward (Mapping - Logical - Constructive - Empirical) per E.14."
