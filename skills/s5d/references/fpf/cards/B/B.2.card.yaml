summary: "> Plain‑English headline. > When composition yields a new, coherent whole—with its own boundary, objective, and capabilities that cannot be faithfully treated as “just parts folded together”—declare a Meta‑Holon Transition. Record the event that created the new holon and let the Γ‑invariants apply anew at the higher level."
