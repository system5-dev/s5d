summary: "The universal pattern for emergence, Meta-Holon Transition (MHT, Pattern B.2), describes how a collection of holons can become a new, coherent whole. This sub-pattern, MST (Sys), details the specific case where the constituent parts are physical or cyber-physical systems (U.System). This is the classic scenario of emergence in engineering and nature: a collection of robots forming a swarm, a group of servers becoming a self-healing cloud platform, or a set of components assembling into a functioning engine."
