summary: "Tag. Architectural pattern Stage. design‑time (calibration + publication) + run‑time (sentinel‑driven telemetry emission; orchestration owned by G.11) Primary output. A bridge calibration kit that turns G.2’s BridgeMatrix rows into F.9 BridgeCards and publishes: a BridgeCalibrationTable (BCT) + CalibrationLedger + RegressionSet + SentinelSet, plus UTS‑visible crossing rows and RSCR‑ready sentinel triggers scoped to PathSliceId / PatternScopeId. Primary hooks. G.Core (Part‑G invariants + RSCR trigger catalogue + default-ownership index), G.2 (BridgeMatrix), F.9 (BridgeCard + CL/CL^k), F.3/F.7 (SenseCell anchoring; row bottleneck discipline), E.18/A.21 (GateCrossing + CrossingBundle checks), G.6 (PathId/PathSliceId citation surface), G.5 (downstream consumer for eligibility/selection), G.11 "
