summary: "This document is the Core Conceptual Specification of the First Principles Framework (FPF). It defines a small, domain-agnostic kernel and a set of extension patterns for publishing, checking, and evolving conceptual work about systems and epistemes (knowledge claims) — and about the organisations and communities that build them. In FPF terms these are all holons: things that can be treated as wholes and as parts."
