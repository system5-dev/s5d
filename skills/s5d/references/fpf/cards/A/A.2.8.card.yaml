summary: "> Type: Definitional (D) > Status: Stable > Normativity: Normative (unless explicitly marked informative) > Placement: Part A → A.2 Roles & Agency Kernel > Refines: A.2 (Role Taxonomy) > Builds on: E.8 (authoring template), A.2.1 (RoleAssignment), A.2.6 (Scope & Γ_time), A.7 (Object≠Description≠Carrier), A.2.3 (U.PromiseContent as promise), A.15.1 (U.Work) > Purpose (one line): Provide a minimal, reusable kernel object for deontic commitments (who is accountable, under what modality, in what scope/window, with respect to which referents, with which adjudication hooks), explicitly separating the commitment object from its utterance descriptions (A.7), so deontics stop “living” in naming patterns and become stable across A.6 and later governance patterns."
