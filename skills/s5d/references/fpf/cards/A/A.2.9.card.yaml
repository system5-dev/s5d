summary: "> Type: Definitional (D) > Status: Stable > Normativity: Normative (unless explicitly marked informative) > Placement: Part A → A.2 Roles & Agency Kernel > Refines: A.2 (Role Taxonomy) > Builds on: A.2.1 (RoleAssignment), A.2.6 (Γ_time / windows), A.7 (Object≠Description≠Carrier), A.10 (SCR/RSCR carrier discipline), A.15.1 (U.Work) > Purpose (one line): Provide a minimal, lintable kernel object for communicative enactments (approvals, authorizations, revocations, notices, declarations, publications) as U.Work, explicitly separating the act from its utterance descriptions and evidence carriers, so governance and gating can cite SpeechActRef without “contract soup” or episteme‑as‑agent mistakes."
