summary: "One‑line summary. U.EpistemicViewing is the describedEntity‑preserving species of U.EffectFreeEpistemicMorphing: an effect‑free projection between epistemes that may change content and representation, but never changes what the episteme is about (the occupant of DescribedEntitySlot in C.2.1)."
