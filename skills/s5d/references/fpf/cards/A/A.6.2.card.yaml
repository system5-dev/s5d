summary: "One‑line summary. U.EffectFreeEpistemicMorphing (EFEM) is the universal class of effect‑free, law‑governed morphisms between epistemes. An EFEM morphism rewrites episteme components (ClaimGraph, describedEntityRef, optional groundingHolonRef, viewpointRef, referenceScheme, and—where C.2.1+ is in use—representationSchemeRef and related slots, plus meta) in a conservative, functorial, reproducible way, with an explicit mode for what happens to the DescribedEntitySlot (DescribedEntityChangeMode ∈ {preserve, retarget}) as defined by C.2.1 U.EpistemeSlotGraph."
