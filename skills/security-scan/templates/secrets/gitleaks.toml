# gitleaks config — secret detection for this repo.
# Run:  gitleaks detect --config .gitleaks.toml --report-format sarif \
#         --report-path test-reports/security/secrets/findings.sarif
# Or let the skill's run.sh drive it (it scans both git history and the work tree).
#
# Secrets are ZERO-TOLERANCE: run.sh fails on any finding regardless of --fail-on.
# There is no "low-severity secret". A committed key is a rotate-now event.

title = "gitleaks config (security-scan skill)"

# Start from the upstream default ruleset (100+ provider patterns), then layer
# project-local rules + allowlist below. Keeping [extend] means new gitleaks
# releases pick up new providers automatically.
[extend]
useDefault = true

# Project-specific rules. Add patterns the default set misses (internal token
# formats, custom prefixes). Example left in place as a template:
#
# [[rules]]
# id = "internal-service-token"
# description = "Internal service token (svc_ prefix)"
# regex = '''svc_[a-zA-Z0-9]{32}'''
# tags = ["token", "internal"]

[allowlist]
description = "Paths and values that are never real secrets"
# Test fixtures, lockfiles, and vendored code generate noise, not leaks.
paths = [
  '''(.*?)(node_modules)(.*)''',
  '''(.*?)(test-reports)(.*)''',
  '''(.*?)\.lock$''',
  '''(.*?)(__fixtures__|__mocks__|fixtures|testdata)(.*)''',
]
# Obvious placeholders. Real-looking dummies belong here, NOT in .gitleaksignore.
regexes = [
  '''(?i)(your[_-]?api[_-]?key|example|changeme|placeholder|dummy|xxxx+)''',
]

# Gate: zero-tolerance — any non-allowlisted, non-waived finding fails the build.
#
# Suppression: never use `.gitleaksignore` or inline `gitleaks:allow`. Route every
# false positive through
#   bash scripts/waiver.sh add <rule-id> --reason ... --approved-by ... --expires YYYY-MM-DD
# A waiver suppresses the finding in run.sh; the secret itself must still be rotated.
