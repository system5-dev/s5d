  # === Python — Ruff (SoTA, Rust-based, replaces flake8+isort+pylint+black) ===
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Type checking — pick one:
  #   pyright (faster, IDE-aligned) via local hook with `uv run pyright`
  #   mypy (more mature) via the upstream pre-commit hook
