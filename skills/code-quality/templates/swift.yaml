  # === Swift — SwiftLint + SwiftFormat (Nick Lockwood) ===
  # Install: brew install swiftlint swiftformat
  - repo: https://github.com/realm/SwiftLint
    rev: 0.57.0
    hooks:
      - id: swiftlint
        args: [--strict]

  - repo: https://github.com/nicklockwood/SwiftFormat
    rev: '0.55.5'
    hooks:
      - id: swiftformat
