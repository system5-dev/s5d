# .github/workflows/code-quality.yml — generated by code-quality skill.
# Runs pre-commit on every push and PR. Uses pinned uv for fast install.
name: Code Quality

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history for ratchet hooks (Spotless, Biome diff modes).
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pre-commit env
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: pre-commit-${{ runner.os }}-

      # Stack toolchains — comment out the ones you don't need.
      # JS/TS via Node (Biome runs as project dep).
      - name: Set up Node
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: ${{ hashFiles('bun.lock*') != '' && 'bun' || (hashFiles('pnpm-lock.yaml') != '' && 'pnpm' || (hashFiles('yarn.lock') != '' && 'yarn' || 'npm')) }}
      - name: Install JS deps
        if: hashFiles('package.json') != ''
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then npm install -g bun && bun install --frozen-lockfile
          elif [ -f pnpm-lock.yaml ]; then npm install -g pnpm && pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then yarn install --frozen-lockfile
          else npm ci
          fi

      # Go
      - name: Set up Go
        if: hashFiles('go.mod') != ''
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Rust
      - name: Set up Rust
        if: hashFiles('Cargo.toml') != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Java (JDK 21)
      - name: Set up Java
        if: hashFiles('pom.xml') != '' || hashFiles('build.gradle*') != ''
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: ${{ hashFiles('pom.xml') != '' && 'maven' || 'gradle' }}

      # .NET
      - name: Set up .NET
        if: hashFiles('**/*.csproj') != '' || hashFiles('**/*.sln') != ''
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      # Ruby
      - name: Set up Ruby
        if: hashFiles('Gemfile') != ''
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      # PHP
      - name: Set up PHP
        if: hashFiles('composer.json') != ''
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
      - name: Install PHP deps
        if: hashFiles('composer.json') != ''
        run: composer install --no-progress --prefer-dist

      - name: Install pre-commit
        run: pip install --upgrade pre-commit

      - name: Run pre-commit
        env:
          # On PRs, lint only changed files vs base; otherwise --all-files.
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ -n "$PR_BASE" ] && [ -n "$PR_HEAD" ]; then
            pre-commit run --show-diff-on-failure --color=always \
              --from-ref "$PR_BASE" --to-ref "$PR_HEAD"
          else
            pre-commit run --show-diff-on-failure --color=always --all-files
          fi
