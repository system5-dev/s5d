# .gitlab-ci.e2e-tests.yml — generated by e2e-tests skill.
# Fragment — include into your main pipeline.

.e2e-base:
  stage: e2e
  artifacts:
    when: always
    paths:
      - test-reports/e2e/
    reports:
      junit: test-reports/e2e/*/junit.xml
    expire_in: 30 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "staging"'

e2e:web:
  extends: .e2e-base
  image: mcr.microsoft.com/playwright:v1.58.2-jammy
  variables:
    PLAYWRIGHT_BASE_URL: {{BASE_URL}}
  before_script:
    - npm ci
  script:
    - bash ~/.agents/skills/e2e-tests/scripts/run.sh --axes web

e2e:api:
  extends: .e2e-base
  image: mcr.microsoft.com/playwright:v1.58.2-jammy
  variables:
    PLAYWRIGHT_BASE_URL: {{BASE_URL}}
  before_script:
    - npm ci
  script:
    - bash ~/.agents/skills/e2e-tests/scripts/run.sh --axes api

e2e:use-case-coverage:
  extends: .e2e-base
  image: alpine:3.20
  needs: [e2e:web, e2e:api]
  before_script:
    - apk add --no-cache bash grep findutils
  script:
    - bash ~/.agents/skills/e2e-tests/scripts/coverage.sh --format md
    - bash ~/.agents/skills/e2e-tests/scripts/coverage.sh --threshold 60
