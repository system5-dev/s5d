# .github/workflows/e2e-tests.yml — generated by e2e-tests skill.
# Runs Playwright (web + api) + Maestro (mobile) per detected axis, uploads
# traces / videos / reports, fails on use-case coverage below threshold.
name: E2E Tests

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  schedule:
    - cron: '17 6 * * *'    # daily smoke at 06:17 UTC

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    if: hashFiles('playwright.config.ts') != ''
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]
    env:
      PLAYWRIGHT_BASE_URL: {{BASE_URL}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - name: Install deps
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then npm install -g bun && bun install --frozen-lockfile
          else npm ci
          fi
      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project }}
      - name: Run Playwright (web)
        run: bash ~/.agents/skills/e2e-tests/scripts/run.sh --axes web
        env:
          PLAYWRIGHT_PROJECT: ${{ matrix.project }}
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-web-${{ matrix.project }}
          path: test-reports/e2e/web/
          retention-days: 30

  api:
    if: hashFiles('e2e/api/**') != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PLAYWRIGHT_BASE_URL: {{BASE_URL}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - name: Install deps
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then npm install -g bun && bun install --frozen-lockfile
          else npm ci
          fi
      - name: Install hurl (if .hurl files present)
        if: hashFiles('e2e/api/**/*.hurl') != ''
        run: curl -fsSL https://github.com/Orange-OpenSource/hurl/releases/latest/download/hurl-x86_64-unknown-linux-gnu.tar.gz | tar xz -C /tmp && sudo mv /tmp/hurl*/hurl /usr/local/bin/
      - name: Run API e2e
        run: bash ~/.agents/skills/e2e-tests/scripts/run.sh --axes api
      - name: Upload API report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-api
          path: test-reports/e2e/api/

  mobile:
    if: hashFiles('.maestro/**') != ''
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install Maestro
        run: curl -fsSL https://get.maestro.mobile.dev | bash
      - name: Run Maestro flows
        run: bash ~/.agents/skills/e2e-tests/scripts/run.sh --axes mobile
      - name: Upload Maestro report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-mobile
          path: test-reports/e2e/mobile/

  use-case-coverage:
    if: always() && hashFiles('.s5d/scenarios/**/*.feature') != ''
    needs: [web, api, mobile]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compute use-case coverage
        run: |
          bash ~/.agents/skills/e2e-tests/scripts/coverage.sh --format md > coverage.md
          bash ~/.agents/skills/e2e-tests/scripts/coverage.sh --format json > coverage.json
          bash ~/.agents/skills/e2e-tests/scripts/coverage.sh --threshold 60   # gate
      - name: Comment use-case coverage on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: coverage.md
          header: e2e-use-case-coverage
      - name: Upload coverage artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-use-case-coverage
          path: |
            coverage.md
            coverage.json
