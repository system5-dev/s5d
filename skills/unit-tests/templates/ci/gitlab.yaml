# .gitlab-ci.unit-tests.yml — generated by unit-tests skill.
# Fragment — merge into your main pipeline via `include:`.

.unit-tests-base:
  stage: test
  artifacts:
    when: always
    paths:
      - test-reports/
    reports:
      junit: test-reports/*/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: test-reports/*/coverage.cobertura.xml
  coverage: '/^TOTAL.+?(\d+\%)$/'
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "staging"'

unit-tests:js:
  extends: .unit-tests-base
  image: node:22-bookworm
  before_script:
    - corepack enable
    - npm ci
  script:
    - bash ~/.agents/skills/unit-tests/scripts/run.sh --stacks js --threshold {{THRESHOLD}}

unit-tests:python:
  extends: .unit-tests-base
  image: python:3.12
  before_script:
    - pip install uv && uv sync --all-extras --dev
  script:
    - bash ~/.agents/skills/unit-tests/scripts/run.sh --stacks python --threshold {{THRESHOLD}}

unit-tests:go:
  extends: .unit-tests-base
  image: golang:1.23
  script:
    - bash ~/.agents/skills/unit-tests/scripts/run.sh --stacks go --threshold {{THRESHOLD}}

unit-tests:rust:
  extends: .unit-tests-base
  image: rust:1.83
  before_script:
    - rustup component add llvm-tools-preview
    - cargo install cargo-llvm-cov
  script:
    - bash ~/.agents/skills/unit-tests/scripts/run.sh --stacks rust --threshold {{THRESHOLD}}

# Add unit-tests:<stack> jobs for the languages your project actually uses.
# Remove the rest — GitLab will skip them anyway thanks to hashFiles-style
# detection inside run.sh, but cleaner to delete the unused jobs.
