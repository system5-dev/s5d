# .github/workflows/unit-tests.yml — generated by unit-tests skill.
# Runs the unit-tests skill's run.sh per stack, uploads coverage to Codecov,
# annotates PRs from JUnit XML, fails on coverage below threshold.
name: Unit Tests

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.stack }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        # Toolchains are conditionally installed via hashFiles() guards below;
        # only stacks present in the repo actually run.
        stack: [js, python, go, rust, java, kotlin, dotnet, ruby, php, shell]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── JS / TS ────────────────────────────────────────────────────────────
      - name: Setup Node
        if: matrix.stack == 'js' && hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: ${{ hashFiles('bun.lock*') != '' && 'bun' || (hashFiles('pnpm-lock.yaml') != '' && 'pnpm' || (hashFiles('yarn.lock') != '' && 'yarn' || 'npm')) }}
      - name: Install JS deps
        if: matrix.stack == 'js' && hashFiles('package.json') != ''
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then npm install -g bun && bun install --frozen-lockfile
          elif [ -f pnpm-lock.yaml ]; then npm install -g pnpm && pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then yarn install --frozen-lockfile
          else npm ci
          fi

      # ── Python ─────────────────────────────────────────────────────────────
      - name: Setup Python
        if: matrix.stack == 'python' && (hashFiles('pyproject.toml') != '' || hashFiles('requirements.txt') != '')
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        if: matrix.stack == 'python' && hashFiles('pyproject.toml') != ''
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install Python deps
        if: matrix.stack == 'python' && (hashFiles('pyproject.toml') != '' || hashFiles('requirements.txt') != '')
        run: |
          if [ -f pyproject.toml ]; then uv sync --all-extras --dev
          elif [ -f requirements.txt ]; then pip install -r requirements.txt && pip install pytest pytest-cov
          fi

      # ── Go ─────────────────────────────────────────────────────────────────
      - name: Setup Go
        if: matrix.stack == 'go' && hashFiles('go.mod') != ''
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install Go coverage helpers
        if: matrix.stack == 'go' && hashFiles('go.mod') != ''
        run: |
          go install github.com/jandelgado/gcov2lcov@latest
          go install github.com/jstemmer/go-junit-report/v2@latest

      # ── Rust ───────────────────────────────────────────────────────────────
      - name: Setup Rust
        if: matrix.stack == 'rust' && hashFiles('Cargo.toml') != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        if: matrix.stack == 'rust' && hashFiles('Cargo.toml') != ''
        uses: taiki-e/install-action@cargo-llvm-cov

      # ── Java ───────────────────────────────────────────────────────────────
      - name: Setup Java
        if: matrix.stack == 'java' && (hashFiles('pom.xml') != '' || hashFiles('build.gradle*') != '')
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: ${{ hashFiles('pom.xml') != '' && 'maven' || 'gradle' }}

      # ── Kotlin ─────────────────────────────────────────────────────────────
      - name: Setup Java (for Kotlin)
        if: matrix.stack == 'kotlin' && hashFiles('build.gradle.kts') != ''
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      # ── .NET ───────────────────────────────────────────────────────────────
      - name: Setup .NET
        if: matrix.stack == 'dotnet' && (hashFiles('**/*.csproj') != '' || hashFiles('**/*.sln') != '')
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      # ── Ruby ───────────────────────────────────────────────────────────────
      - name: Setup Ruby
        if: matrix.stack == 'ruby' && hashFiles('Gemfile') != ''
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      # ── PHP ────────────────────────────────────────────────────────────────
      - name: Setup PHP
        if: matrix.stack == 'php' && hashFiles('composer.json') != ''
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: pcov
          tools: composer
      - name: Install PHP deps
        if: matrix.stack == 'php' && hashFiles('composer.json') != ''
        run: composer install --no-progress --prefer-dist

      # ── Shell ──────────────────────────────────────────────────────────────
      - name: Setup bats-core
        if: matrix.stack == 'shell' && hashFiles('**/*.bats') != ''
        run: |
          sudo apt-get update && sudo apt-get install -y bats

      # ── Run tests ──────────────────────────────────────────────────────────
      - name: Run unit-tests skill
        id: run
        run: |
          bash ~/.agents/skills/unit-tests/scripts/run.sh \
            --stacks ${{ matrix.stack }} \
            --threshold {{THRESHOLD}}

      # ── Upload artefacts ───────────────────────────────────────────────────
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.stack }}
          path: test-reports/${{ matrix.stack }}/
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        if: always() && hashFiles(format('test-reports/{0}/coverage.lcov', matrix.stack)) != ''
        uses: codecov/codecov-action@v5
        with:
          files: test-reports/${{ matrix.stack }}/coverage.lcov
          flags: ${{ matrix.stack }}
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Publish test report
        if: always() && hashFiles(format('test-reports/{0}/junit.xml', matrix.stack)) != ''
        uses: dorny/test-reporter@v1
        with:
          name: ${{ matrix.stack }} tests
          path: test-reports/${{ matrix.stack }}/junit.xml
          reporter: java-junit
          fail-on-error: false
