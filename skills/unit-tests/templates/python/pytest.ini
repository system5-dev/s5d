# pytest.ini — generated by unit-tests skill.
# Coverage threshold and reporters baked in so `pytest` alone enforces them.
[pytest]
minversion = 8.0
testpaths = tests src
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --strict-config
    -ra
    --cov
    --cov-report=term
    --cov-report=html:test-reports/python/coverage_html
    --cov-report=lcov:test-reports/python/coverage.lcov
    --cov-report=xml:test-reports/python/coverage.xml
    --cov-fail-under={{THRESHOLD}}
    --junitxml=test-reports/python/junit.xml
filterwarnings =
    error
    ignore::DeprecationWarning
markers =
    slow: tests that take more than a second
    integration: tests that hit external services
