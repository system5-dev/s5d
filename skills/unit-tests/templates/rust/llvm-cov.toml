# .config/cargo-llvm-cov.toml — generated by unit-tests skill.
# Pin coverage targets so `cargo llvm-cov` runs the same way locally and in CI.

[llvm-cov]
output-dir = "test-reports/rust"
fail-under-lines = {{THRESHOLD}}
fail-under-regions = 60

# Exclude generated / vendored code from coverage.
ignore-filename-regex = "(tests/|examples/|build\\.rs)"
