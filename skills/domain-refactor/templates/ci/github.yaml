# .github/workflows/domain-refactor-drift.yml — generated by domain-refactor skill.
# Runs analyze.sh on every PR, fails if architecture-violation count goes UP
# vs. the base branch. Used as a guardrail to keep refactors honest.
name: Architecture Drift

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

permissions:
  contents: read
  pull-requests: write

jobs:
  drift-check:
    if: hashFiles('.s5d/discovery/architecture-map.md') != ''
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Baseline = base branch
      - name: Compute baseline violations
        id: baseline
        if: github.event_name == 'pull_request'
        run: |
          git checkout ${{ github.event.pull_request.base.sha }} -- . || true
          bash ~/.agents/skills/domain-refactor/scripts/analyze.sh > /tmp/baseline.json
          BASELINE=$(python3 -c "import json; print(json.load(open('/tmp/baseline.json'))['summary']['total'])")
          echo "violations=$BASELINE" >> $GITHUB_OUTPUT
          git checkout ${{ github.event.pull_request.head.sha }} -- .

      - name: Compute current violations
        id: current
        run: |
          bash ~/.agents/skills/domain-refactor/scripts/analyze.sh > /tmp/current.json
          CURRENT=$(python3 -c "import json; print(json.load(open('/tmp/current.json'))['summary']['total'])")
          echo "violations=$CURRENT" >> $GITHUB_OUTPUT

      - name: Gate — violation count must not increase
        if: github.event_name == 'pull_request'
        run: |
          BASELINE=${{ steps.baseline.outputs.violations }}
          CURRENT=${{ steps.current.outputs.violations }}
          echo "baseline: $BASELINE  →  current: $CURRENT"
          if [ "$CURRENT" -gt "$BASELINE" ]; then
            echo "✗ violation count went UP — see the analyze.json artefact"
            exit 1
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: architecture-drift
          message: |
            ### Architecture Drift Report

            | metric | baseline | current | delta |
            |---|---:|---:|---:|
            | total violations | ${{ steps.baseline.outputs.violations }} | ${{ steps.current.outputs.violations }} | |

            See [analyze report artefact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).

      - name: Upload analyze report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-analyze-${{ github.event.pull_request.number || github.sha }}
          path: /tmp/current.json
