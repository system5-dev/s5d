# .s5d/scenarios/index.yaml — generated by scenario-mine.
# Maps every scenario to its source evidence and the s5d use case it belongs to.
# The skill rewrites this file on each run; manual edits get overwritten.

generated_at: "<YYYY-MM-DDTHH:MM:SSZ>"
generated_by: "scenario-mine"
s5d_architecture_map: ".s5d/discovery/architecture-map.md"

features:
  - file: ".s5d/scenarios/<use-case-id>.feature"
    use_case_id: "<use-case-id>"
    domain_id: "<domain-id>"
    scenario_count: <integer>
    sources:
      - "<file:line>"                  # code path
      - "<doc-file:line>"              # doc reference
      - "<test-file:line>"             # reverse-engineered test
    last_synced: "<YYYY-MM-DD>"

# Drift check: re-run `bash scripts/discover.sh` then compare against this index.
# If any `sources` entry no longer exists, regenerate the relevant feature.
