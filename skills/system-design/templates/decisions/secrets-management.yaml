id: secrets-management
title: Secrets / config management
description: |
  Where API keys, DB credentials, signing keys live at rest and how
  services fetch them at runtime.

axes:
  ops_capacity:      20
  budget_monthly_usd: 10
  compliance:        25
  lock_in_tolerance: 10
  time_to_prod:      10
  team_familiarity:  10
  multi_region:      15

variants:
  - id: vault
    name: HashiCorp Vault (self-hosted)
    kind: self-hosted
    self_hostable: true
    scores:
      ops_capacity: 1
      budget_monthly_usd: 4
      compliance: 5
      lock_in_tolerance: 5
      time_to_prod: 2
      team_familiarity: 3
      multi_region: 4
    notes: |
      - The reference. Dynamic secrets, PKI, transit encryption.
      - Cluster ops are real (Raft storage, auto-unseal HSM).
      - License changed in 2023 — confirm BSL terms or use OpenBao fork.

  - id: openbao
    name: OpenBao (Vault OSS fork)
    kind: self-hosted
    self_hostable: true
    scores:
      ops_capacity: 1
      budget_monthly_usd: 5
      compliance: 4
      lock_in_tolerance: 5
      time_to_prod: 2
      team_familiarity: 2
      multi_region: 4
    notes: |
      - Apache-licensed fork from the BSL transition (2024).
      - Drop-in for Vault OSS users; commercial Vault features absent.

  - id: aws_secrets_manager
    name: AWS Secrets Manager
    kind: managed
    self_hostable: false
    cloud: aws
    scores:
      ops_capacity: 5
      budget_monthly_usd: 3    # ~$0.40 per secret per month
      compliance: 5
      lock_in_tolerance: 2
      time_to_prod: 5
      team_familiarity: 4
      multi_region: 4
    notes: |
      - Right answer if you're on AWS. IAM integration is the killer feature.
      - SSM Parameter Store is a cheaper alternative for less-sensitive
        config; use Secrets Manager for actual secrets (auto-rotation,
        cross-region replication).

  - id: doppler
    name: Doppler
    kind: managed
    self_hostable: false
    scores:
      ops_capacity: 5
      budget_monthly_usd: 3
      compliance: 4
      lock_in_tolerance: 2
      time_to_prod: 5
      team_familiarity: 3
      multi_region: 4
    notes: |
      - Developer-first DX. Sync to AWS/GCP/K8s native stores.
      - Good for multi-cloud or vendor-agnostic teams.

  - id: infisical
    name: Infisical (OSS + managed)
    kind: hybrid
    self_hostable: true
    scores:
      ops_capacity: 3
      budget_monthly_usd: 4
      compliance: 4
      lock_in_tolerance: 5
      time_to_prod: 4
      team_familiarity: 2
      multi_region: 3
    notes: |
      - Active OSS in 2025-2026. End-to-end encryption.
      - Self-host straightforward (Docker + Postgres); managed available.

  - id: env_files
    name: .env files + .gitignore + 1Password / Bitwarden
    kind: self-hosted
    self_hostable: true
    scores:
      ops_capacity: 5
      budget_monthly_usd: 5
      compliance: 2
      lock_in_tolerance: 5
      time_to_prod: 5
      team_familiarity: 5
      multi_region: 1
    notes: |
      - Pragmatic for tiny teams (≤3 people, single env).
      - Audit trail is "git history of secrets accidentally committed".
      - Move to a real store before SOC2 / hiring beyond a small team.

hard_constraints:
  - rule: "compliance contains 'soc2' AND variant.id == 'env_files'"
    action: disqualify
    reason: "SOC2 requires access logs and rotation that env-files cannot provide"
  - rule: "ops_capacity:zero AND variant.id IN ['vault', 'openbao']"
    action: disqualify
    reason: "self-hosted Vault is a platform team's job"
  - rule: "multi_region:active_active AND variant.id == 'env_files'"
    action: disqualify
