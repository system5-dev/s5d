name: Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - name: Cache cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
      - name: cargo fmt --check
        working-directory: rust
        run: cargo fmt --all -- --check
      - name: cargo clippy
        working-directory: rust
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        working-directory: rust
        run: cargo test --all

  architecture-lint:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - name: Cache cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
      - name: Build s5d from source
        working-directory: rust
        run: cargo build --release --bin s5d
      - name: Add s5d to PATH
        run: echo "${{ github.workspace }}/rust/target/release" >> $GITHUB_PATH
      - name: s5d ci exec (source-built)
        run: s5d ci exec
