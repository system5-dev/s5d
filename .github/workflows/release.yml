name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: s5d-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: s5d-darwin-x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: s5d-linux-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        working-directory: rust
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp rust/target/${{ matrix.target }}/release/s5d ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            s5d-darwin-arm64/s5d-darwin-arm64
            s5d-darwin-x86_64/s5d-darwin-x86_64
            s5d-linux-x86_64/s5d-linux-x86_64
          generate_release_notes: true
